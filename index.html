<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
:root{
  --bg1:#ffffff;--bg2:#f5f4f0;--bg3:#edecea;
  --tx1:#1a1916;--tx2:#6b6a66;--tx3:#9b9a97;
  --bd3:rgba(26,25,22,0.12);--bd2:rgba(26,25,22,0.22);--bd1:rgba(26,25,22,0.35);
  --ff:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --r1:8px;--r2:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg1:#1e1e1c;--bg2:#2a2a27;--bg3:#141412;
    --tx1:#f0ede8;--tx2:#9b9a97;--tx3:#6b6a66;
    --bd3:rgba(240,237,232,0.1);--bd2:rgba(240,237,232,0.2);--bd1:rgba(240,237,232,0.32);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff);font-size:13px;color:var(--tx1);background:var(--bg3);min-height:100vh}
.shell{max-width:1280px;margin:16px auto;background:var(--bg1);border:.5px solid var(--bd3);border-radius:var(--r2);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.app{display:flex;flex-direction:column;min-height:700px;width:100%}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:.5px solid var(--bd3);gap:8px;flex-wrap:wrap;background:var(--bg1)}
.brand{display:flex;align-items:center;gap:8px}
.logo{width:26px;height:26px;border-radius:6px;background:#1D9E75;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.logo img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.ttl{font-size:15px;font-weight:500}
.tr{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.btn{background:transparent;border:.5px solid var(--bd2);border-radius:var(--r1);padding:4px 10px;font-size:12px;cursor:pointer;color:var(--tx1);white-space:nowrap;font-family:var(--ff)}
.btn:hover{background:var(--bg2)}
.btn.on{background:var(--bg2);border-color:var(--bd1);font-weight:500}
.btn-new{background:#1D9E75;border:.5px solid #1D9E75;color:#fff;font-weight:500;padding:5px 12px}
.btn-new:hover{background:#0F6E56;border-color:#0F6E56}
.btn-s{padding:3px 8px;font-size:11px}
.btn-d{color:#791F1F;border-color:#F09595}
.btn-d:hover{background:#FCEBEB}
.content{flex:1;padding:0}
.section-nav{display:flex;align-items:stretch;border-bottom:.5px solid var(--bd3);padding:0 6px;gap:1px;overflow-x:auto;flex-shrink:0;background:var(--bg1)}
.stab{padding:8px 13px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:var(--tx2);white-space:nowrap;display:flex;align-items:center;gap:5px;user-select:none}
.stab:hover{color:var(--tx1)}
.stab.on{color:var(--tx1);border-bottom-color:var(--tx1);font-weight:500}
.proj-tab-row{display:flex;align-items:stretch;border-bottom:.5px solid var(--bd3);padding:0 6px;gap:1px;overflow-x:auto;flex-shrink:0;background:var(--bg1)}
.ptab{padding:7px 12px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:var(--tx2);white-space:nowrap;display:flex;align-items:center;gap:5px;user-select:none}
.ptab:hover{color:var(--tx1)}
.ptab.on{color:var(--tx1);border-bottom-color:var(--tx1);font-weight:500}
.nav-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:7px 12px;border-bottom:.5px solid var(--bd3);background:var(--bg1)}
.nav-lbl{font-size:13px;font-weight:500;min-width:160px;text-align:center}
.nav-btn{background:transparent;border:.5px solid var(--bd2);border-radius:var(--r1);width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.nav-btn:hover{background:var(--bg2)}
.gw{overflow-x:auto;max-height:520px;overflow-y:auto}
.gt{min-width:900px}
.gh{display:flex;position:sticky;top:0;background:var(--bg1);z-index:10;border-bottom:.5px solid var(--bd3)}
.glc{width:190px;min-width:190px;padding:7px 12px;font-size:11px;color:var(--tx2);font-weight:500;border-right:.5px solid var(--bd3)}
.gtlh{flex:1;overflow:hidden}
.gmr{display:flex}
.gmc{flex:0 0 auto;font-size:11px;color:var(--tx2);padding:3px 4px;border-right:.5px solid var(--bd3);text-align:center;overflow:hidden;white-space:nowrap}
.gdr{display:flex;border-top:.5px solid var(--bd3)}
.gdc{flex:0 0 auto;font-size:10px;color:var(--tx3);text-align:center;border-right:.5px solid var(--bd3);padding:2px 0;overflow:hidden}
.grow{display:flex;border-bottom:.5px solid var(--bd3);min-height:50px;cursor:pointer}

.glbl{width:190px;min-width:190px;padding:7px 12px;border-right:.5px solid var(--bd3);display:flex;align-items:center;gap:7px}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.glblt{overflow:hidden}
.glbln{font-weight:500;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.glbls{font-size:10px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gbars{flex:1;position:relative}
.gbar{position:absolute;height:20px;border-radius:3px;top:50%;transform:translateY(-50%);display:flex;align-items:center;padding:0 5px;font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden}
.ggrid{position:absolute;top:0;bottom:0;width:.5px;background:var(--bd3);pointer-events:none}
.gtoday{position:absolute;top:0;bottom:0;width:2px;background:#E24B4A;pointer-events:none;z-index:5}
.gconflict{position:absolute;top:0;bottom:0;pointer-events:none;z-index:4;opacity:.18}
.gcbadge{position:absolute;top:2px;right:4px;font-size:10px;background:#FCEBEB;color:#791F1F;border:.5px solid #F09595;border-radius:4px;padding:1px 5px;white-space:nowrap;z-index:6}
.legend{display:flex;flex-wrap:wrap;gap:7px;padding:8px 14px;border-top:.5px solid var(--bd3);align-items:center}
.li{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--tx2)}
.lsw{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.alerts{padding:8px 14px;display:flex;flex-direction:column;gap:5px}
.arow{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#FCEBEB;border:.5px solid #F09595;border-radius:var(--r1);font-size:12px;color:#791F1F}
.fg{display:flex;flex-direction:column;gap:3px}

.fi{border:.5px solid var(--bd2);border-radius:var(--r1);padding:5px 8px;font-size:12px;background:transparent;color:var(--tx1);font-family:var(--ff);width:100%}

.cpr{display:flex;gap:7px;flex-wrap:wrap}
.copt{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.copt:hover,.copt.sel{transform:scale(1.2);border-color:var(--tx2)}
.notes-ta{width:100%;border:.5px solid var(--bd3);border-radius:var(--r1);padding:7px 9px;font-size:12px;background:transparent;color:var(--tx1);resize:vertical;font-family:var(--ff);min-height:52px}
.notes-ta:focus{outline:none;border-color:var(--bd1)}
.sel-in{background:transparent;border:.5px solid var(--bd2);border-radius:4px;color:var(--tx1);font-size:12px;padding:2px 4px;font-family:var(--ff);cursor:pointer}
.divider{height:.5px;background:var(--bd3)}
.capv{padding:18px;display:flex;flex-direction:column;gap:9px;overflow-y:auto;max-height:580px}
.capc{background:var(--bg2);border-radius:var(--r1);padding:10px 14px}
.capt{height:13px;border-radius:3px;background:var(--bd3);overflow:hidden;margin:5px 0 3px}
.capf{height:100%;border-radius:3px}
.ok{background:#1D9E75}.warn{background:#BA7517}.over{background:#E24B4A}
.fitv{padding:18px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;max-height:580px}
.fslot{border-radius:var(--r1);padding:9px 12px;border:.5px solid var(--bd3)}
.fslot.good{border-color:#5DCAA5;background:#E1F5EE;color:#085041}
.fslot.tight{border-color:#EF9F27;background:#FAEEDA;color:#633806}
.fslot.none{border-color:#F09595;background:#FCEBEB;color:#791F1F}
.fslot-t{font-size:12px;font-weight:500;margin-bottom:2px}
.fslot-s{font-size:11px;opacity:.8}
.plv{padding:18px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;max-height:640px}
.plc{border:.5px solid var(--bd3);border-radius:var(--r2);padding:14px;display:flex;flex-direction:column;gap:11px}
.plr{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:.5px solid var(--bd3)}
.plr:last-child{border-bottom:none}
.plsw{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.durin{background:transparent;border:.5px solid var(--bd3);border-radius:4px;color:var(--tx1);font-size:12px;padding:2px 4px;width:46px;font-family:var(--ff);text-align:center}
.pld{font-size:12px;color:var(--tx2);min-width:140px;text-align:right}
.pld.set{color:var(--tx1)}
.suc{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:var(--r1);background:#E1F5EE;color:#085041;border:.5px solid #5DCAA5}
.wrn{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:var(--r1);background:#FAEEDA;color:#633806;border:.5px solid #EF9F27}
.ovv{padding:18px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:620px}
.ovrow{display:flex;align-items:center;gap:10px;padding:10px 14px;border:.5px solid var(--bd3);border-radius:var(--r2);cursor:pointer}
.ovrow:hover{background:var(--bg2)}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.ovname{font-size:13px;font-weight:500;min-width:110px}
.ovphase{font-size:11px;display:flex;flex-direction:column;gap:2px;flex:1}
.ovproj{font-size:12px;color:var(--tx1)}
.pt{width:100%;border-collapse:collapse;table-layout:fixed}
.pt th{font-size:11px;color:var(--tx2);font-weight:400;text-align:left;padding:4px 7px;border-bottom:.5px solid var(--bd3)}
.pt td{padding:5px 7px;border-bottom:.5px solid var(--bd3);font-size:12px}
.pt tr:last-child td{border-bottom:none}
.pt tr.phd td{opacity:.5}
.pt tr.phd input{text-decoration:line-through}
.pt tr.pha{background:#E1F5EE}
.dtin{background:transparent;border:none;color:var(--tx1);font-size:12px;cursor:pointer;padding:2px 3px;border-radius:4px;font-family:var(--ff);width:100%}
.dtin:focus{outline:none;background:var(--bg2)}
.txin{background:transparent;border:none;color:var(--tx1);font-size:12px;padding:2px 3px;font-family:var(--ff);width:100%;outline:none}
.gs-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--tx2);text-decoration:none;padding:4px 8px;border:.5px solid var(--bd3);border-radius:var(--r1)}
.gs-link:hover{background:var(--bg2)}
.cbtn{width:18px;height:18px;border-radius:50%;border:2px solid var(--bd2);cursor:pointer;flex-shrink:0}
.cpkr{background:var(--bg1);border:.5px solid var(--bd3);border-radius:var(--r1);padding:9px;display:inline-flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.delbtn{background:none;border:none;cursor:pointer;color:var(--tx3);padding:2px 5px;border-radius:4px;font-size:14px;font-family:var(--ff)}
.delbtn:hover{color:#E24B4A;background:#FCEBEB}
.rdel2{opacity:0}
tr:hover .rdel2{opacity:1}
.apbtn{font-size:12px;color:var(--tx2);cursor:pointer;background:none;border:none;padding:3px 7px;border-radius:4px;display:inline-flex;align-items:center;gap:3px;font-family:var(--ff)}
.apbtn:hover{background:var(--bg2);color:var(--tx1)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
.b-req{background:#EEEDFE;color:#3C3489}.b-app{background:#E6F1FB;color:#0C447C}.b-rej{background:#FCEBEB;color:#791F1F}
.b-hld{background:#F1EFE8;color:#444441}.b-upc{background:#FAEEDA;color:#633806}.b-act{background:#E1F5EE;color:#085041}.b-cmp{background:#EAF3DE;color:#27500A}
.hcard{background:#F1EFE8;border:.5px solid #D3D1C7;border-radius:var(--r1);padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.hcard.rej{background:#FCEBEB;border-color:#F09595}
.pv{padding:18px;display:flex;flex-direction:column;gap:13px;overflow-y:auto;max-height:640px}
.pvtitle{font-size:17px;font-weight:500;border:none;background:transparent;color:var(--tx1);outline:none;padding:2px 0;border-bottom:1.5px solid transparent;flex:1;font-family:var(--ff)}
.pvtitle:focus{border-bottom-color:var(--bd1)}
.slbl{font-size:11px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px}
.tv{display:flex;flex-direction:column}
.tvhdr{background:#7B6BA8;padding:12px 18px}
.tvhdr h2{font-size:14px;font-weight:500;color:#fff;margin-bottom:1px}
.tvhdr p{font-size:11px;color:rgba(255,255,255,.7)}
.tvf{display:flex;align-items:center;gap:6px;padding:7px 16px;border-bottom:.5px solid var(--bd3);flex-wrap:wrap}
.fb{padding:3px 9px;font-size:11px;border:.5px solid var(--bd3);border-radius:10px;cursor:pointer;background:transparent;color:var(--tx2);font-family:var(--ff)}
.fb:hover{background:var(--bg2);color:var(--tx1)}
.fb.on{border-color:var(--bd1);color:var(--tx1);background:var(--bg2);font-weight:500}
.tvs{overflow-x:auto;max-height:540px;overflow-y:auto}
.tvt{width:100%;border-collapse:collapse;table-layout:fixed;min-width:960px}
.tvt thead{position:sticky;top:0;z-index:10}
.tvt thead th{background:var(--bg2);padding:7px 10px;font-size:11px;font-weight:500;color:var(--tx2);text-align:left;border-bottom:.5px solid var(--bd3);border-right:.5px solid var(--bd3);white-space:nowrap;cursor:pointer}
.tvt thead th:hover{color:var(--tx1)}
.tvt tbody tr{border-bottom:.5px solid var(--bd3)}
.tvt tbody tr:hover{background:var(--bg2)}
.tvt tbody tr.rreq{background:#FFFDF0}
.tvt tbody tr.rhld td{opacity:.65}
.tvt tbody tr.rrej td{opacity:.4}
.tvt td{padding:7px 10px;border-right:.5px solid var(--bd3);font-size:12px}
.cel{background:transparent;border:none;color:var(--tx1);font-size:12px;font-family:var(--ff);width:100%;outline:none;padding:0}
.cel:focus{background:var(--bg2);border-radius:3px;padding:1px 3px;margin:-1px -3px}
.cels{background:transparent;border:none;color:var(--tx1);font-size:12px;font-family:var(--ff);cursor:pointer;padding:0;width:100%}
.rdel{opacity:0;background:none;border:none;cursor:pointer;color:var(--tx3);font-size:14px;padding:2px 4px;border-radius:3px;font-family:var(--ff)}
tr:hover .rdel{opacity:1}
.rdel:hover{color:#E24B4A;background:#FCEBEB}
.tvadd{display:flex;align-items:center;gap:5px;padding:8px 16px;font-size:12px;color:var(--tx3);cursor:pointer;border-top:.5px solid var(--bd3)}
.tvadd:hover{background:var(--bg2);color:var(--tx1)}
.tvft{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;border-top:.5px solid var(--bd3);font-size:11px;color:var(--tx2)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--bg1);border:.5px solid var(--bd3);border-radius:var(--r2);padding:18px;width:360px;display:flex;flex-direction:column;gap:11px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal h3{font-size:14px;font-weight:500}
.mact{display:flex;gap:7px;justify-content:flex-end}
.toast{position:fixed;bottom:16px;right:16px;background:var(--bg2);border:.5px solid var(--bd3);border-radius:var(--r1);padding:7px 14px;font-size:12px;color:var(--tx2);display:none;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.1)}
</style>
</head>
<body>
<div class="shell"><div class="app" id="app"></div></div>
<div class="toast" id="toast">&#10003; Saved</div>
<script>
const PCOLS=['#378ADD','#1D9E75','#D85A30','#7F77DD','#D4537E','#BA7517','#639922','#888780'];
const PHCOLS={Request:{bg:'#E6F1FB',t:'#0C447C'},Planning:{bg:'#EEEDFE',t:'#3C3489'},Recruitment:{bg:'#FAEEDA',t:'#633806'},Research:{bg:'#E1F5EE',t:'#085041'},Analysis:{bg:'#FAECE7',t:'#712B13'},Reporting:{bg:'#FBEAF0',t:'#72243E'}};
const POOL=[{bg:'#E6F1FB',t:'#0C447C'},{bg:'#EEEDFE',t:'#3C3489'},{bg:'#FAEEDA',t:'#633806'},{bg:'#E1F5EE',t:'#085041'},{bg:'#FAECE7',t:'#712B13'},{bg:'#FBEAF0',t:'#72243E'}];
const DDUR={Request:3,Planning:5,Recruitment:7,Research:10,Analysis:5,Reporting:5};
const DPHASES=['Request','Planning','Recruitment','Research','Analysis','Reporting'];
const STS=['Request','Approved','Rejected','On Hold','Upcoming','Active','Completed'];
const OBG=['#E6F1FB','#FAEEDA','#EEEDFE','#E1F5EE','#FBEAF0','#FAECE7'];
const OTX=['#0C447C','#633806','#3C3489','#085041','#72243E','#712B13'];
const GS='https://docs.google.com/spreadsheets/d/1NNseu9ZcaMTh65kSLlTuNe7DlIc9qj6VfBwUeYomDPc/edit';
const SK='proj_dash_v7';
const LOGO_URL=''; // paste an image URL here (e.g. hosted logo) to replace the "UL" placeholder
function pc(n,i){return PHCOLS[n]||POOL[i%POOL.length];}
function td(){return new Date().toISOString().split('T')[0];}
function tdf(){return new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}
function subD(d,n){let x=new Date(d);x.setDate(x.getDate()-n);return x.toISOString().split('T')[0];}
function dur(s,e){if(!s||!e)return 0;return Math.round((new Date(e)-new Date(s))/86400000);}
function fmtD(d){if(!d)return'';let[y,m,day]=d.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+' '+parseInt(day);}
function fmtF(d){if(!d)return'';let[y,m,day]=d.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+' '+parseInt(day)+', '+y;}
function mbs(s,e){let r=[],c=new Date(new Date(s).getFullYear(),new Date(s).getMonth(),1),end=new Date(e);while(c<=end){r.push({y:c.getFullYear(),m:c.getMonth()});c.setMonth(c.getMonth()+1);}return r;}
function fq(ds){let d=new Date(ds),m=d.getMonth(),fy=d.getFullYear();if(m>=8)return{q:1,fy:fy+1};if(m<=1)return{q:2,fy};if(m<=4)return{q:3,fy};return{q:4,fy};}
function MN(){return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];}
function ini(n){if(!n)return'?';let p=n.trim().split(' ');return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function pse(p){let d=p.phases.flatMap(ph=>[ph.start,ph.end]).filter(Boolean).sort();return{s:d[0]||'',e:d[d.length-1]||''};}
function save(){S.lastUpdated=tdf();try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}let t=document.getElementById('toast');if(t){t.style.display='flex';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',1400);}}
function load(){try{let s=localStorage.getItem(SK);if(s)return JSON.parse(s);}catch(e){}return null;}

let S=load()||{
  view:'table',range:'monthly',navAnchor:new Date().toISOString(),ap:null,showNew:false,cpk:null,plan:null,
  fd:35,fa:td(),tf:'All',ts:null,td2:1,lastUpdated:tdf(),

S.navAnchor=new Date().toISOString();S.showNew=false;S.cpk=null;

function conflicts(){
  let c=[],ps=S.projects.filter(p=>['Approved','Upcoming','Active'].includes(p.status));
  for(let i=0;i<ps.length;i++)for(let j=i+1;j<ps.length;j++){
    let a=ps[i],b=ps[j];
    let ar=a.phases.filter(ph=>ph.name==='Research'&&ph.start&&ph.end);
    let br=b.phases.filter(ph=>ph.name==='Research'&&ph.start&&ph.end);
    ar.forEach(ap=>br.forEach(bp=>{
      let ao=ap.owner||a.owner,bo=bp.owner||b.owner;
      if(ao&&bo&&ao===bo){let os=ap.start>bp.start?ap.start:bp.start,oe=ap.end<bp.end?ap.end:bp.end;if(os<=oe)c.push({owner:ao,p1:a.name,p2:b.name,from:os,to:oe});}
    }));
  }
  return c;
}
function cback(phases,dl){let rev=[...phases].reverse(),cur=dl;rev=rev.map(ph=>{let d=ph.defaultDays||DDUR[ph.name]||5;let e=cur,s=subD(e,d-1);cur=subD(s,1);return{...ph,start:s,end:e};});return rev.reverse();}

function gwin(){
  let a=new Date(S.navAnchor);
  if(S.range==='weekly'){let s=new Date(a);s.setDate(a.getDate()-a.getDay());let e=new Date(s);e.setDate(s.getDate()+6);return{s:s.toISOString().split('T')[0],e:e.toISOString().split('T')[0]};}
  if(S.range==='quarterly'){
    let q=fq(a.toISOString().split('T')[0]),qs,qe;
    if(q.q===1){qs=new Date(q.fy-1,8,1);qe=new Date(q.fy-1,11,0);}
    else if(q.q===2){qs=new Date(q.fy-1,11,1);qe=new Date(q.fy,2,0);}
    else if(q.q===3){qs=new Date(q.fy,2,1);qe=new Date(q.fy,5,0);}
    else{qs=new Date(q.fy,5,1);qe=new Date(q.fy,8,0);}
    return{s:qs.toISOString().split('T')[0],e:qe.toISOString().split('T')[0]};
  }
  let s=new Date(a.getFullYear(),a.getMonth(),1),e=new Date(a.getFullYear(),a.getMonth()+1,0);
  return{s:s.toISOString().split('T')[0],e:e.toISOString().split('T')[0]};
}

function navLabel(){
  let a=new Date(S.navAnchor);
  if(S.range==='weekly'){let win=gwin();return`${fmtD(win.s)} &ndash; ${fmtD(win.e)}, ${a.getFullYear()}`;}
  if(S.range==='quarterly'){let q=fq(a.toISOString().split('T')[0]);return`FY${q.fy} Q${q.q}`;}
  return`${MN()[a.getMonth()]} ${a.getFullYear()}`;
}
function navShift(dir){
  let a=new Date(S.navAnchor);
  if(S.range==='weekly')a.setDate(a.getDate()+7*dir);
  else if(S.range==='quarterly')a.setMonth(a.getMonth()+3*dir);

}

    let grid=months.map(m=>{let lp=(new Date(m.y,m.m,1)-sD)/rng*100;return lp>0&&lp<100?`<div class="ggrid" style="left:${lp}%"></div>`:''}).join('');
    let hb=p.status==='On Hold'?` <span style="font-size:10px;background:#F1EFE8;color:#444441;border-radius:3px;padding:1px 4px">On Hold</span>`:'';

function rFit(){
  let dn=parseInt(S.fd)||35,sa=S.fa||td();
  let h=new Date(sa);h.setMonth(h.getMonth()+12);
  let busy=new Set();
  S.projects.filter(p=>['Approved','Upcoming','Active'].includes(p.status)).forEach(p=>p.phases.forEach(ph=>{if(!ph.start||!ph.end)return;let ps=new Date(ph.start),pe=new Date(ph.end),sd=new Date(sa);for(let d=new Date(ps>sd?ps:sd);d<=pe&&d<=h;d.setDate(d.getDate()+1))busy.add(d.toISOString().split('T')[0]);}));
  let wins=[],cur=new Date(sa),ws=null,wd=0;
  for(let i=0;i<365;i++){let ds=cur.toISOString().split('T')[0];if(!busy.has(ds)){if(!ws)ws=ds;wd++;}else{if(ws&&wd>0){let e2=new Date(cur);e2.setDate(e2.getDate()-1);wins.push({s:ws,e:e2.toISOString().split('T')[0],d:wd});}ws=null;wd=0;}cur.setDate(cur.getDate()+1);}
  if(ws&&wd>0){let e2=new Date(cur);e2.setDate(e2.getDate()-1);wins.push({s:ws,e:e2.toISOString().split('T')[0],d:wd});}
  let slots=wins.filter(w=>w.d>=Math.max(1,dn*0.5)).slice(0,8);
  let sh=slots.length?slots.map(w=>{let fits=w.d>=dn,tight=!fits&&w.d>=dn*0.7,cls=fits?'good':tight?'tight':'none',lbl=fits?'Fits comfortably':tight?'Tight fit':'Too short';return`<div class="fslot ${cls}"><div class="fslot-t">${fmtF(w.s)} &ndash; ${fmtF(w.e)}</div><div class="fslot-s">${w.d} free days &middot; ${lbl}</div></div>`;}).join(''):`<div class="fslot none"><div class="fslot-t">No windows found</div><div class="fslot-s">No open slots in the next 12 months.</div></div>`;
  return`<div class="fitv"><div style="border:.5px solid var(--bd3);border-radius:var(--r2);padding:14px"><div class="slbl" style="margin-bottom:9px">Find availability</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px"><div class="fg"><label class="fl">Duration needed (days)</label><input class="fi" type="number" min="1" max="365" value="${dn}" oninput="S.fd=this.value;render()"/></div><div class="fg"><label class="fl">Start no earlier than</label><input class="fi" type="date" value="${sa}" onchange="S.fa=this.value;render()"/></div></div></div><div><div class="slbl" style="margin-bottom:7px">Available windows</div><div style="display:flex;flex-direction:column;gap:7px">${sh}</div></div></div>`;
}

    return`<tr class="${rc}">
      <td style="width:20%"><div style="display:flex;align-items:center;gap:6px"><span class="pdot" style="background:${p.color};cursor:pointer" onclick="selP(${p.id})" title="Open project"></span><input class="cel" value="${esc(p.name)}" oninput="upd(${p.id},'name',this.value)" style="font-weight:500"/></div></td>
      <td style="width:15%"><input class="cel" value="${esc(p.notes)}" oninput="upd(${p.id},'notes',this.value)" placeholder="Notes&hellip;"/>${p.hn&&p.status==='On Hold'?`<div style="font-size:11px;color:var(--tx2);margin-top:2px">${esc(p.hn)}</div>`:''}</td>
      <td style="width:12%"><select class="cels" onchange="upd(${p.id},'status',this.value)" onclick="event.stopPropagation()">${STS.map(s=>`<option${p.status===s?' selected':''}>${s}</option>`).join('')}</select></td>
      <td style="width:10%"><select class="cels" onchange="upd(${p.id},'cp',this.value)"><option value="">&#8212;</option>${[...new Set([...DPHASES,...p.phases.map(ph=>ph.name)])].map(s=>`<option${p.cp===s?' selected':''}>${s}</option>`).join('')}</select></td>
      <td style="width:9%"><input class="cel" value="${esc(se.s||'')}" oninput="upd(${p.id},'startDate',this.value)" placeholder="TBD"/></td>
      <td style="width:9%"><input class="cel" value="${esc(se.e||'')}" oninput="upd(${p.id},'endDate',this.value)" placeholder="TBD"/></td>
      <td style="width:10%"><input class="cel" value="${esc(p.owner||'')}" oninput="upd(${p.id},'owner',this.value)" placeholder="Lead&hellip;"/></td>
      <td style="width:13%;font-size:11px"><input class="cel" value="${esc(p.stk||'')}" oninput="upd(${p.id},'stk',this.value)" placeholder="Stakeholders&hellip;" style="font-size:11px"/></td>
      <td style="width:2%;text-align:center"><button class="rdel" onclick="delP(${p.id})" title="Remove">&#215;</button></td>
    </tr>`;
  }).join('');
  return`<div class="tv">
    <div class="tvhdr"><h2>Project list</h2><p>Last updated: ${esc(S.lastUpdated)} &middot; editable inline</p></div>
    <div class="tvf">
      <span style="font-size:11px;color:var(--tx2)">Filter:</span>
      ${filters.map(f2=>`<button class="fb${S.tf===f2?' on':''}" onclick="S.tf='${f2}';render()">${f2}</button>`).join('')}
    </div>
    <div class="tvs">
      <table class="tvt">
        <thead><tr>
          <th onclick="tsort('name')">Project ${arrow('name')}</th>
          <th>Notes</th>
          <th onclick="tsort('status')">Status ${arrow('status')}</th>
          <th>Phase</th>
          <th onclick="tsort('startDate')">Start ${arrow('startDate')}</th>
          <th onclick="tsort('endDate')">End ${arrow('endDate')}</th>
          <th onclick="tsort('owner')">Project lead ${arrow('owner')}</th>
          <th>Stakeholder(s)</th>
          <th></th>
        </tr></thead>
        <tbody>${rows||`<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--tx2)">No projects match this filter.</td></tr>`}</tbody>
      </table>
    </div>
    <div class="tvadd" onclick="showNew()">+ Add project</div>
    <div class="tvft"><span>${ps.length} project${ps.length!==1?'s':''} shown &middot; On Hold sorts to the bottom</span><button class="btn btn-s" onclick="expAll()">&#8595; Export CSV</button></div>
  </div>`;
}

function rProj(pid){
  let p=S.projects.find(x=>x.id===pid);
  if(!p)return'<div style="padding:32px;text-align:center;color:var(--tx2)">Project not found.</div>';
  let cO=PCOLS.map(c=>`<div class="copt${p.color===c?' sel':''}" style="background:${c}" onclick="setCol(${p.id},'${c}')"></div>`).join('');
  let cpk=S.cpk===p.id?`<div class="cpkr">${cO}</div>`:'';
  let actPh=p.phases.findIndex(ph=>!ph.done&&ph.start&&ph.end);
  let se=pse(p),totD=p.phases.reduce((s,ph)=>s+(ph.start&&ph.end?dur(ph.start,ph.end):0),0),doneC=p.phases.filter(ph=>ph.done).length;
  let phRows=p.phases.map((ph,i)=>{
    let c=pc(ph.name,i),d=ph.start&&ph.end?dur(ph.start,ph.end)+'d':'',rc=ph.done?'phd':i===actPh?'pha':'';
    return`<tr class="${rc}"><td style="width:4%"><input type="checkbox" ${ph.done?'checked':''} onchange="togDone(${p.id},${i},this.checked)" style="cursor:pointer;accent-color:#1D9E75"/></td><td style="width:25%"><div style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:2px;background:${c.bg};border:1px solid ${c.t}40;flex-shrink:0;display:inline-block"></span><input value="${esc(ph.name)}" oninput="upPhn(${p.id},${i},this.value)" style="border:none;background:transparent;font-size:12px;color:var(--tx1);font-family:var(--ff);width:100%;outline:none${ph.done?';text-decoration:line-through':''}"/></div></td><td style="width:18%"><input class="dtin" type="date" value="${ph.start||''}" onchange="upPhd(${p.id},${i},'start',this.value)"/></td><td style="width:18%"><input class="dtin" type="date" value="${ph.end||''}" onchange="upPhd(${p.id},${i},'end',this.value)"/></td><td style="width:18%"><input class="txin" value="${esc(ph.owner||'')}" oninput="upPho(${p.id},${i},this.value)" placeholder="Owner"/></td><td style="width:9%;color:var(--tx2);font-size:11px">${d}</td><td style="width:4%"><button class="delbtn rdel2" onclick="delPh(${p.id},${i})">&#215;</button></td></tr>`;
  }).join('');
  let sm={Request:'b-req',Approved:'b-app',Rejected:'b-rej','On Hold':'b-hld',Upcoming:'b-upc',Active:'b-act',Completed:'b-cmp'};
  let hcard=(p.status==='On Hold'||p.status==='Rejected')?`<div class="hcard${p.status==='Rejected'?' rej':''}"><div style="font-size:12px;font-weight:500;color:${p.status==='Rejected'?'#791F1F':'#444441'}">${p.status==='On Hold'?'On hold':'Rejected'}</div><textarea class="notes-ta" oninput="upd(${p.id},'hn',this.value)" placeholder="${p.status==='On Hold'?'Why on hold? When might it begin?':'Reason for rejection&hellip;'}" style="min-height:44px">${esc(p.hn||'')}</textarea></div>`:'';
  let allPh=[...new Set([...DPHASES,...p.phases.map(ph=>ph.name)])];
  return`<div class="pv">
    <div style="display:flex;align-items:flex-start;gap:9px">
      <div style="display:flex;flex-direction:column;gap:4px;padding-top:5px"><div class="cbtn" style="background:${p.color}" onclick="togCpk(${p.id})"></div>${cpk}</div>
      <div style="flex:1;display:flex;flex-direction:column;gap:7px">
        <input class="pvtitle" value="${esc(p.name)}" oninput="upd(${p.id},'name',this.value)" placeholder="Project name"/>
        <div style="display:flex;gap:7px;align-items:flex-end;flex-wrap:wrap">
          <div class="fg"><label class="fl">Project owner</label><input class="fi" style="width:140px" value="${esc(p.owner||'')}" oninput="upd(${p.id},'owner',this.value)" placeholder="Owner"/></div>
          <div class="fg"><label class="fl">Stakeholders</label><input class="fi" style="width:200px" value="${esc(p.stk||'')}" oninput="upd(${p.id},'stk',this.value)" placeholder="Stakeholders&hellip;"/></div>
          <div class="fg"><label class="fl">Status</label><select class="sel-in" onchange="upd(${p.id},'status',this.value);render()">${STS.map(s=>`<option${p.status===s?' selected':''}>${s}</option>`).join('')}</select></div>
          <div class="fg"><label class="fl">Current phase</label><select class="sel-in" onchange="upd(${p.id},'cp',this.value);render()"><option value="">&#8212;</option>${allPh.map(s=>`<option${p.cp===s?' selected':''}>${s}</option>`).join('')}</select></div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <span class="badge ${sm[p.status]||'b-req'}">${esc(p.status)}</span>
          ${se.s?`<span style="font-size:11px;color:var(--tx2)">${fmtD(se.s)} &rarr; ${fmtD(se.e)} &middot; ${totD}d total &middot; ${doneC}/${p.phases.length} phases done</span>`:''}
        </div>
      </div>
    </div>
    ${hcard}
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
        <span class="slbl" style="margin-bottom:0">Phases &amp; timeline</span>
        <button class="btn btn-s" onclick="openPlan(${p.id})">Re-plan from deadline</button>
      </div>
      <table class="pt"><thead><tr><th style="width:4%"></th><th>Phase</th><th>Start</th><th>End</th><th>Phase owner</th><th>Dur.</th><th></th></tr></thead><tbody>${phRows}</tbody></table>
      <div style="padding:4px 7px"><button class="apbtn" onclick="addPh(${p.id})">+ Add phase</button></div>
    </div>
    <div><div class="slbl">Notes</div><textarea class="notes-ta" oninput="upd(${p.id},'notes',this.value)" placeholder="Notes, links, context&hellip;">${esc(p.notes||'')}</textarea></div>
    <div class="divider"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:7px;flex-wrap:wrap"><a href="${GS}" class="gs-link" target="_blank" rel="noopener">Google Sheet &#8599;</a><button class="btn btn-s" onclick="expOne(${p.id})">Export CSV</button></div>
      <button class="btn btn-s btn-d" onclick="delP(${p.id})">Delete project</button>
    </div>
  </div>`;
}

function render(){
  let v=S.view,main='';
  if(v==='gantt')main=rGantt();
  else if(v==='table')main=rTable();
  else if(v==='capacity')main=rCap();
  else if(v==='fit')main=rFit();
  else if(v==='planner')main=rPlan();
  else if(v==='owners')main=rOwners();
  else if(v==='project')main=rProj(S.ap);
  let modal='';
  if(S.showNew){
    let np=S.newProj||{};
    let cO=PCOLS.map(c=>`<div class="copt${(np.color||PCOLS[0])===c?' sel':''}" style="background:${c}" onclick="S.newProj.color='${c}';render()"></div>`).join('');
    modal=`<div class="modal-ov" onclick="if(event.target===this){S.showNew=false;render()}">
      <div class="modal">
        <h3>New project</h3>
        <div class="fg"><label class="fl">Project name</label><input class="fi" placeholder="Project name" value="${esc(np.name||'')}" oninput="S.newProj.name=this.value"/></div>
        <div class="fg"><label class="fl">Project owner</label><input class="fi" placeholder="Owner" value="${esc(np.owner||'')}" oninput="S.newProj.owner=this.value"/></div>
        <div class="fg"><label class="fl">Stakeholders</label><input class="fi" placeholder="Stakeholders&hellip;" value="${esc(np.stk||'')}" oninput="S.newProj.stk=this.value"/></div>
        <div class="fg"><label class="fl">Status</label><select class="fi" onchange="S.newProj.status=this.value">${STS.map(s=>`<option${(np.status||'Request')===s?' selected':''}>${s}</option>`).join('')}</select></div>
        <div class="fg"><label class="fl">Color</label><div class="cpr">${cO}</div></div>
        <div class="mact"><button class="btn" onclick="S.showNew=false;render()">Cancel</button><button class="btn btn-new" onclick="createP()">Create project</button></div>
      </div>
    </div>`;
  }
  let ptabs=S.projects.map(p=>`<div class="ptab${v==='project'&&S.ap===p.id?' on':''}" onclick="selP(${p.id})" style="display:flex;align-items:center;gap:5px"><span style="width:7px;height:7px;border-radius:50%;background:${p.color};flex-shrink:0"></span>${esc(p.name)||'Unnamed'}</div>`).join('');
  let logoHTML=LOGO_URL?`<img src="${LOGO_URL}" alt="Usability Lab logo"/>`:'UL';
  document.getElementById('app').innerHTML=`
    <div class="topbar">
      <div class="brand">
        <div class="logo">${logoHTML}</div>
        <span class="ttl">Project Dashboard</span>
      </div>
      <div class="tr">
        ${(v==='gantt'||v==='capacity')?`<div style="display:flex;gap:2px"><button class="btn${S.range==='weekly'?' on':''}" onclick="setR('weekly')">Week</button><button class="btn${S.range==='monthly'?' on':''}" onclick="setR('monthly')">Month</button><button class="btn${S.range==='quarterly'?' on':''}" onclick="setR('quarterly')">Quarter</button></div>`:''}
        <button class="btn" onclick="expAll()">Export</button>
        <button class="btn btn-new" onclick="showNew()">+ New project</button>
        <a href="${GS}" class="gs-link" target="_blank" rel="noopener">Sheet &#8599;</a>
      </div>
    </div>
    <div class="section-nav">
      <div class="stab${v==='table'?' on':''}" onclick="setV('table')">Project list</div>
      <div class="stab${v==='gantt'?' on':''}" onclick="setV('gantt')">Gantt</div>
      <div class="stab${v==='capacity'?' on':''}" onclick="setV('capacity')">Team capacity</div>
      <div class="stab${v==='fit'?' on':''}" onclick="setV('fit')">Find availability</div>
      <div class="stab${v==='planner'?' on':''}" onclick="setV('planner')">Planner</div>
      <div class="stab${v==='owners'?' on':''}" onclick="setV('owners')">By owner</div>
    </div>
    ${ptabs?`<div class="proj-tab-row">${ptabs}</div>`:''}
    <div class="content">${modal||main}</div>
  `;
}
function setV(v){S.view=v;render();}
function setR(r){S.range=r;render();}
function selP(id){S.ap=id;S.view='project';S.cpk=null;render();}
function showNew(){S.showNew=true;S.newProj={name:'',owner:'',stk:'',status:'Request',color:PCOLS[S.projects.length%PCOLS.length]};render();}
function togCpk(id){S.cpk=S.cpk===id?null:id;render();}
function setCol(id,c){let p=S.projects.find(x=>x.id===id);if(p){p.color=c;S.cpk=null;render();save();}}
function upd(id,f,v){let p=S.projects.find(x=>x.id===id);if(p){p[f]=v;if(['status','cp'].includes(f))render();save();}}
function togDone(pid,idx,v){let p=S.projects.find(x=>x.id===pid);if(p&&p.phases[idx]){p.phases[idx].done=v;render();save();}}
function upPhn(pid,idx,v){let p=S.projects.find(x=>x.id===pid);if(p&&p.phases[idx]){p.phases[idx].name=v;save();}}
function upPhd(pid,idx,f,v){let p=S.projects.find(x=>x.id===pid);if(p&&p.phases[idx]){p.phases[idx][f]=v;render();save();}}
function upPho(pid,idx,v){let p=S.projects.find(x=>x.id===pid);if(p&&p.phases[idx]){p.phases[idx].owner=v;save();}}
function addPh(pid){let p=S.projects.find(x=>x.id===pid);if(p){p.phases.push({name:'New phase',start:'',end:'',done:false,owner:''});render();save();}}
function delPh(pid,idx){let p=S.projects.find(x=>x.id===pid);if(p){p.phases.splice(idx,1);render();save();}}
function delP(id){if(!confirm('Delete this project?'))return;S.projects=S.projects.filter(p=>p.id!==id);S.ap=null;S.view='table';render();save();}
function createP(){let np=S.newProj,name=(np.name||'').trim()||'New Project',id=Date.now();S.projects.push({id,name,status:np.status||'Request',color:np.color||PCOLS[0],owner:np.owner||'',stk:np.stk||'',notes:'',hn:'',cp:'',phases:DPHASES.map(n=>({name:n,start:'',end:'',done:false,owner:np.owner||''}))});S.showNew=false;S.ap=id;S.view='project';render();save();}
function applyPlan(){let np=S.plan;if(!np||!np.dl)return;let comp=cback(np.phases,np.dl),id=Date.now();S.projects.push({id,name:np.name||'New Project',status:'Request',color:np.color||PCOLS[0],owner:'',stk:'',notes:'',hn:'',cp:'',phases:comp.map(ph=>({name:ph.name,start:ph.start,end:ph.end,done:false,owner:''}))});S.plan=null;S.ap=id;S.view='project';render();save();}
function openPlan(pid){let p=S.projects.find(x=>x.id===pid);if(!p)return;S.plan={dl:'',name:p.name,color:p.color,phases:p.phases.map(ph=>({name:ph.name,defaultDays:ph.start&&ph.end?dur(ph.start,ph.end):(DDUR[ph.name]||5)}))};S.view='planner';render();}
function tsort(col){if(S.ts===col)S.td2*=-1;else{S.ts=col;S.td2=1;}render();}
function toCSV(rows){return rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');}
function dlCSV(csv,fn){let b=new Blob([csv],{type:'text/csv'});let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);}
function expOne(pid){let p=S.projects.find(x=>x.id===pid);if(!p)return;let rows=[['Project','Owner','Stakeholders','Status','Current Phase','Phase','Phase Owner','Start','End','Duration (days)','Done','Notes','Hold Note']];p.phases.forEach(ph=>{rows.push([p.name,p.owner||'',p.stk||'',p.status,p.cp||'',ph.name,ph.owner||'',ph.start||'',ph.end||'',ph.start&&ph.end?dur(ph.start,ph.end):'',ph.done?'Yes':'No',p.notes||'',p.hn||'']);});dlCSV(toCSV(rows),`${p.name.replace(/[^a-z0-9]/gi,'_')}.csv`);}
function expAll(){let rows=[['Project','Owner','Stakeholders','Status','Current Phase','Phase','Phase Owner','Start','End','Duration (days)','Done','Notes','Hold Note']];S.projects.forEach(p=>{p.phases.forEach(ph=>{rows.push([p.name,p.owner||'',p.stk||'',p.status,p.cp||'',ph.name,ph.owner||'',ph.start||'',ph.end||'',ph.start&&ph.end?dur(ph.start,ph.end):'',ph.done?'Yes':'No',p.notes||'',p.hn||'']);});});dlCSV(toCSV(rows),'all_projects.csv');}
render();
</script>
</body>
</html>
