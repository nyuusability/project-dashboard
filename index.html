<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:13px;color:var(--color-text-primary);background:transparent}
.app{display:flex;flex-direction:column;min-height:640px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:.5px solid var(--color-border-tertiary);gap:8px;flex-wrap:wrap}
.topbar-right{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.app-title{font-size:15px;font-weight:500}
.btn{background:transparent;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:4px 10px;font-size:12px;cursor:pointer;color:var(--color-text-primary);white-space:nowrap;font-family:var(--font-sans)}
.btn:hover{background:var(--color-background-secondary)}
.btn.active{background:var(--color-background-secondary);border-color:var(--color-border-primary);font-weight:500}
.btn-primary{background:var(--color-background-secondary);border:.5px solid var(--color-border-primary)}
.btn-sm{padding:3px 8px;font-size:11px}
.btn-danger{color:#791F1F;border-color:#F09595}
.btn-danger:hover{background:#FCEBEB}
.tab-bar{display:flex;align-items:stretch;border-bottom:.5px solid var(--color-border-tertiary);padding:0 14px;gap:2px;overflow-x:auto;background:var(--color-background-primary)}
.tab{padding:7px 11px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:var(--color-text-secondary);white-space:nowrap;display:flex;align-items:center;gap:5px;user-select:none}
.tab:hover{color:var(--color-text-primary)}
.tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);font-weight:500}
.tab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tab-sep{width:.5px;background:var(--color-border-tertiary);margin:5px 3px;align-self:stretch}
.tab-add{padding:7px 9px;cursor:pointer;color:var(--color-text-tertiary);display:flex;align-items:center;font-size:17px}
.tab-add:hover{color:var(--color-text-primary)}
.content{flex:1}

/* ── GANTT ── */
.gantt-wrap{overflow-x:auto;max-height:420px;overflow-y:auto}
.gantt{min-width:800px}
.gh{display:flex;position:sticky;top:0;background:var(--color-background-primary);z-index:10;border-bottom:.5px solid var(--color-border-tertiary)}
.glc{width:160px;min-width:160px;padding:7px 10px;font-size:11px;color:var(--color-text-secondary);font-weight:500;border-right:.5px solid var(--color-border-tertiary)}
.gtlh{flex:1;overflow:hidden}
.gmr{display:flex}
.gmc{flex:0 0 auto;font-size:11px;color:var(--color-text-secondary);padding:3px 4px;border-right:.5px solid var(--color-border-tertiary);text-align:center;overflow:hidden;white-space:nowrap}
.gdr{display:flex;border-top:.5px solid var(--color-border-tertiary)}
.gdc{flex:0 0 auto;font-size:10px;color:var(--color-text-tertiary);text-align:center;border-right:.5px solid var(--color-border-tertiary);padding:2px 0;overflow:hidden}
.grow{display:flex;border-bottom:.5px solid var(--color-border-tertiary);min-height:46px;cursor:pointer}
.grow:hover .glbl{background:var(--color-background-secondary)}
.glbl{width:160px;min-width:160px;padding:7px 10px;border-right:.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:7px;transition:background .15s}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.glblt{overflow:hidden}
.glbln{font-weight:500;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.glbls{font-size:10px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gbars{flex:1;position:relative}
.gbar{position:absolute;height:18px;border-radius:3px;top:50%;transform:translateY(-50%);display:flex;align-items:center;padding:0 4px;font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden}
.ggrid{position:absolute;top:0;bottom:0;width:.5px;background:var(--color-border-tertiary);pointer-events:none}
.gtoday{position:absolute;top:0;bottom:0;width:2px;background:#E24B4A;pointer-events:none;z-index:5}
.gconflict{position:absolute;top:0;bottom:0;pointer-events:none;z-index:4;opacity:.18}
.gcbadge{position:absolute;top:2px;right:4px;font-size:10px;background:#FCEBEB;color:#791F1F;border:.5px solid #F09595;border-radius:4px;padding:1px 5px;white-space:nowrap;z-index:6}
.legend{display:flex;flex-wrap:wrap;gap:7px;padding:7px 14px;border-top:.5px solid var(--color-border-tertiary);align-items:center}
.li{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary)}
.lsw{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.alerts{padding:7px 14px;display:flex;flex-direction:column;gap:5px}
.alert-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#FCEBEB;border:.5px solid #F09595;border-radius:var(--border-radius-md);font-size:12px;color:#791F1F}

/* ── CAPACITY ── */
.cap-view{padding:14px;display:flex;flex-direction:column;gap:9px;overflow-y:auto;max-height:520px}
.cap-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:9px 13px}
.cap-track{height:13px;border-radius:3px;background:var(--color-border-tertiary);overflow:hidden;margin:5px 0 3px}
.cap-fill{height:100%;border-radius:3px}
.ok{background:#1D9E75}.warn{background:#BA7517}.over{background:#E24B4A}

/* ── FIT ── */
.fit-view{padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;max-height:520px}
.fit-slot{border-radius:var(--border-radius-md);padding:9px 12px;border:.5px solid var(--color-border-tertiary)}
.fit-slot.good{border-color:#5DCAA5;background:#E1F5EE;color:#085041}
.fit-slot.tight{border-color:#EF9F27;background:#FAEEDA;color:#633806}
.fit-slot.none2{border-color:#F09595;background:#FCEBEB;color:#791F1F}
.fit-slot-t{font-size:12px;font-weight:500;margin-bottom:2px}
.fit-slot-s{font-size:11px;opacity:.8}

/* ── PLANNER ── */
.pl-view{padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;max-height:580px}
.pl-card{border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:13px;display:flex;flex-direction:column;gap:11px}
.pl-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:.5px solid var(--color-border-tertiary)}
.pl-row:last-child{border-bottom:none}
.pl-sw{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.dur-in{background:transparent;border:.5px solid var(--color-border-tertiary);border-radius:4px;color:var(--color-text-primary);font-size:12px;padding:2px 4px;width:46px;font-family:var(--font-sans);text-align:center}
.dur-in:focus{outline:none;border-color:var(--color-border-primary)}
.pl-dates{font-size:12px;color:var(--color-text-secondary);min-width:140px;text-align:right}
.pl-dates.set{color:var(--color-text-primary)}
.suc-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:var(--border-radius-md);background:#E1F5EE;color:#085041;border:.5px solid #5DCAA5}
.wrn-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:var(--border-radius-md);background:#FAEEDA;color:#633806;border:.5px solid #EF9F27}

/* ── OWNER VIEW ── */
.ov{padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;max-height:560px}
.ov-group{border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.ov-gh{padding:9px 12px;background:var(--color-background-secondary);display:flex;align-items:center;gap:10px;border-bottom:.5px solid var(--color-border-tertiary)}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.ov-pr{padding:8px 12px;display:flex;align-items:center;gap:10px;border-bottom:.5px solid var(--color-border-tertiary);cursor:pointer}
.ov-pr:last-child{border-bottom:none}
.ov-pr:hover{background:var(--color-background-secondary)}
.ov-bw{flex:1;height:10px;background:var(--color-border-tertiary);border-radius:3px;position:relative;overflow:hidden}
.ov-bs{position:absolute;height:100%}

/* ── PROJECT TAB ── */
.pv{padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;max-height:580px}
.pv-title{font-size:16px;font-weight:500;border:none;background:transparent;color:var(--color-text-primary);outline:none;padding:2px 0;border-bottom:1.5px solid transparent;flex:1;font-family:var(--font-sans)}
.pv-title:focus{border-bottom-color:var(--color-border-primary)}
.sec-lbl{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px}
.pt{width:100%;border-collapse:collapse;table-layout:fixed}
.pt th{font-size:11px;color:var(--color-text-secondary);font-weight:400;text-align:left;padding:4px 7px;border-bottom:.5px solid var(--color-border-tertiary)}
.pt td{padding:5px 7px;border-bottom:.5px solid var(--color-border-tertiary);font-size:12px}
.pt tr:last-child td{border-bottom:none}
.pt tr.ph-done td{opacity:.5}
.pt tr.ph-done input{text-decoration:line-through}
.pt tr.ph-active{background:#E1F5EE}
.date-in{background:transparent;border:none;color:var(--color-text-primary);font-size:12px;cursor:pointer;padding:2px 3px;border-radius:4px;font-family:var(--font-sans);width:100%}
.date-in:focus{outline:none;background:var(--color-background-secondary)}
.txt-in{background:transparent;border:none;color:var(--color-text-primary);font-size:12px;padding:2px 3px;font-family:var(--font-sans);width:100%;outline:none}
.sel-in{background:transparent;border:.5px solid var(--color-border-secondary);border-radius:4px;color:var(--color-text-primary);font-size:12px;padding:2px 4px;font-family:var(--font-sans);cursor:pointer}
.notes-ta{width:100%;border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:7px 9px;font-size:12px;background:transparent;color:var(--color-text-primary);resize:vertical;font-family:var(--font-sans);min-height:52px}
.notes-ta:focus{outline:none;border-color:var(--color-border-primary)}
.divider{height:.5px;background:var(--color-border-tertiary)}
.gs-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-secondary);text-decoration:none;padding:4px 8px;border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md)}
.gs-link:hover{background:var(--color-background-secondary)}
.color-btn{width:18px;height:18px;border-radius:50%;border:2px solid var(--color-border-secondary);cursor:pointer;flex-shrink:0}
.color-btn:hover{transform:scale(1.15)}
.cpicker{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:9px;display:inline-flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.copt{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.copt:hover,.copt.sel{transform:scale(1.2);border-color:var(--color-text-secondary)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);padding:2px 5px;border-radius:4px;font-size:14px;font-family:var(--font-sans)}
.del-btn:hover{color:#E24B4A;background:#FCEBEB}
.row-del{opacity:0}
tr:hover .row-del{opacity:1}
.add-phase-btn{font-size:12px;color:var(--color-text-secondary);cursor:pointer;background:none;border:none;padding:3px 7px;border-radius:4px;display:inline-flex;align-items:center;gap:3px;font-family:var(--font-sans)}
.add-phase-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
.b-req{background:#EEEDFE;color:#3C3489}.b-app{background:#E1F5EE;color:#085041}.b-rej{background:#FCEBEB;color:#791F1F}.b-hold{background:#F1EFE8;color:#444441}.b-upc{background:#E6F1FB;color:#0C447C}
.b-pln{background:#E6F1FB;color:#0C447C}.b-act{background:#E1F5EE;color:#085041}.b-cmp{background:#EAF3DE;color:#27500A}
.hold-card{background:#F1EFE8;border:.5px solid #D3D1C7;border-radius:var(--border-radius-md);padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.hold-card.rej{background:#FCEBEB;border-color:#F09595}

/* ── TABLE VIEW ── */
.tv{display:flex;flex-direction:column}
.tv-hdr{background:#7B6BA8;padding:10px 14px}
.tv-hdr h2{font-size:14px;font-weight:500;color:#fff;margin-bottom:1px}
.tv-hdr p{font-size:11px;color:rgba(255,255,255,.7)}
.tv-filters{display:flex;align-items:center;gap:6px;padding:6px 12px;border-bottom:.5px solid var(--color-border-tertiary);flex-wrap:wrap;background:var(--color-background-primary)}
.flt-btn{padding:3px 9px;font-size:11px;border:.5px solid var(--color-border-tertiary);border-radius:10px;cursor:pointer;background:transparent;color:var(--color-text-secondary);font-family:var(--font-sans)}
.flt-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.flt-btn.on{border-color:var(--color-border-primary);color:var(--color-text-primary);background:var(--color-background-secondary);font-weight:500}
.tv-scroll{overflow-x:auto;max-height:460px;overflow-y:auto}
.tv-tbl{width:100%;border-collapse:collapse;table-layout:fixed;min-width:860px}
.tv-tbl thead{position:sticky;top:0;z-index:10}
.tv-tbl thead th{background:var(--color-background-secondary);padding:6px 9px;font-size:11px;font-weight:500;color:var(--color-text-secondary);text-align:left;border-bottom:.5px solid var(--color-border-tertiary);border-right:.5px solid var(--color-border-tertiary);white-space:nowrap;cursor:pointer;user-select:none}
.tv-tbl thead th:last-child{border-right:none}
.tv-tbl thead th:hover{color:var(--color-text-primary)}
.tv-tbl tbody tr{border-bottom:.5px solid var(--color-border-tertiary)}
.tv-tbl tbody tr:last-child{border-bottom:none}
.tv-tbl tbody tr:hover{background:var(--color-background-secondary)}
.tv-tbl tbody tr.req-row{background:#FFFDF0}
.tv-tbl tbody tr.req-row:hover{background:#FEF9E0}
.tv-tbl tbody tr.hold-row td{opacity:.65}
.tv-tbl tbody tr.rej-row td{opacity:.4}
.tv-tbl td{padding:6px 9px;border-right:.5px solid var(--color-border-tertiary);vertical-align:middle;font-size:12px}
.tv-tbl td:last-child{border-right:none}
.cel{background:transparent;border:none;color:var(--color-text-primary);font-size:12px;font-family:var(--font-sans);width:100%;outline:none;padding:0}
.cel:focus{background:var(--color-background-secondary);border-radius:3px;padding:1px 3px;margin:-1px -3px}
.cel-date{background:transparent;border:none;color:var(--color-text-primary);font-size:11px;cursor:pointer;padding:0;font-family:var(--font-sans);width:100%}
.cel-date:focus{outline:none;background:var(--color-background-secondary);border-radius:3px}
.cel-sel{background:transparent;border:none;color:var(--color-text-primary);font-size:12px;font-family:var(--font-sans);cursor:pointer;padding:0;width:100%}
.cel-sel:focus{outline:none}
.badges-cell{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.b-ph-research{background:#E1F5EE;color:#085041}
.b-ph-planning{background:#EEEDFE;color:#3C3489}
.b-ph-recruitment{background:#FAEEDA;color:#633806}
.b-ph-analysis{background:#FAECE7;color:#712B13}
.b-ph-reporting{background:#FBEAF0;color:#72243E}
.b-ph-request{background:#E6F1FB;color:#0C447C}
.row-del2{opacity:0;background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:14px;padding:2px 4px;border-radius:3px;font-family:var(--font-sans)}
tr:hover .row-del2{opacity:1}
.row-del2:hover{color:#E24B4A;background:#FCEBEB}
.tv-footer{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-top:.5px solid var(--color-border-tertiary);background:var(--color-background-primary);font-size:11px;color:var(--color-text-secondary)}
.tv-add{display:flex;align-items:center;gap:5px;padding:7px 12px;font-size:12px;color:var(--color-text-tertiary);cursor:pointer;border-top:.5px solid var(--color-border-tertiary);background:var(--color-background-primary)}
.tv-add:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}

/* ── MODAL ── */
.modal-bg{display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.42);min-height:500px;border-radius:var(--border-radius-lg)}
.modal{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:18px;width:340px;display:flex;flex-direction:column;gap:11px}
.modal h3{font-size:14px;font-weight:500}
.modal-actions{display:flex;gap:7px;justify-content:flex-end}
.fg{display:flex;flex-direction:column;gap:3px}
.fl{font-size:11px;color:var(--color-text-secondary)}
.fi{border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:5px 8px;font-size:12px;background:transparent;color:var(--color-text-primary);font-family:var(--font-sans);width:100%}
.fi:focus{outline:none;border-color:var(--color-border-primary)}
.cpr{display:flex;gap:7px;flex-wrap:wrap}

.toast{position:absolute;bottom:10px;right:12px;background:var(--color-background-secondary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:5px 11px;font-size:12px;color:var(--color-text-secondary);display:none;z-index:300}
</style>

<div style="position:relative">
<div class="app" id="app"></div>
<div class="toast" id="toast"><i class="ti ti-check" aria-hidden="true"></i> Saved</div>
</div>

<script>
const PCOLS=['#378ADD','#1D9E75','#D85A30','#7F77DD','#D4537E','#BA7517','#639922','#888780'];
const PHCOLS={Request:{bg:'#E6F1FB',t:'#0C447C'},Planning:{bg:'#EEEDFE',t:'#3C3489'},Recruitment:{bg:'#FAEEDA',t:'#633806'},Research:{bg:'#E1F5EE',t:'#085041'},Analysis:{bg:'#FAECE7',t:'#712B13'},Reporting:{bg:'#FBEAF0',t:'#72243E'}};
const POOL=[{bg:'#E6F1FB',t:'#0C447C'},{bg:'#EEEDFE',t:'#3C3489'},{bg:'#FAEEDA',t:'#633806'},{bg:'#E1F5EE',t:'#085041'},{bg:'#FAECE7',t:'#712B13'},{bg:'#FBEAF0',t:'#72243E'}];
const DEF_DUR={Request:3,Planning:5,Recruitment:7,Research:10,Analysis:5,Reporting:5};
const DEF_PHASES=['Request','Planning','Recruitment','Research','Analysis','Reporting'];
const REQ_ST=['Request','Approved','Rejected','On Hold','Upcoming'];
const PROG_ST=['Planned','Active','Complete'];
const PHASE_ST=['','Request','Planning','Recruitment','Research','Analysis','Reporting'];
const OWNER_BG=['#E6F1FB','#FAEEDA','#EEEDFE','#E1F5EE','#FBEAF0','#FAECE7'];
const OWNER_TX=['#0C447C','#633806','#3C3489','#085041','#72243E','#712B13'];
const GS='https://docs.google.com/spreadsheets/d/1NNseu9ZcaMTh65kSLlTuNe7DlIc9qj6VfBwUeYomDPc/edit';
const STOR='proj_dash_v5';

function phCol(n,i){return PHCOLS[n]||POOL[i%POOL.length];}
function today(){return new Date().toISOString().split('T')[0];}
function todayFull(){return new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}
function subD(d,n){let x=new Date(d);x.setDate(x.getDate()-n);return x.toISOString().split('T')[0];}
function dur(s,e){if(!s||!e)return 0;return Math.round((new Date(e)-new Date(s))/86400000);}
function fmtD(d){if(!d)return'';let[y,m,day]=d.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+' '+parseInt(day);}
function fmtFull(d){if(!d)return'';let[y,m,day]=d.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+' '+parseInt(day)+', '+y;}
function mthBetween(s,e){let r=[],c=new Date(new Date(s).getFullYear(),new Date(s).getMonth(),1),end=new Date(e);while(c<=end){r.push({y:c.getFullYear(),m:c.getMonth()});c.setMonth(c.getMonth()+1);}return r;}
function fiscalQ(ds){let d=new Date(ds),m=d.getMonth(),fy=d.getFullYear();if(m>=8)return{q:1,fy:fy+1};if(m<=1)return{q:2,fy};if(m<=4)return{q:3,fy};return{q:4,fy};}
function initials(n){if(!n)return'?';let p=n.trim().split(' ');return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function projStartEnd(p){
  let dates=p.phases.flatMap(ph=>[ph.start,ph.end]).filter(Boolean).sort();
  return{start:dates[0]||'',end:dates[dates.length-1]||''};
}

function getConflicts(){
  let c=[],projs=state.projects.filter(p=>p.reqStatus==='Approved'||p.reqStatus==='Upcoming');
  for(let i=0;i<projs.length;i++)for(let j=i+1;j<projs.length;j++){
    let a=projs[i],b=projs[j];
    let ar=a.phases.filter(ph=>ph.name==='Research'&&ph.start&&ph.end);
    let br=b.phases.filter(ph=>ph.name==='Research'&&ph.start&&ph.end);
    ar.forEach(ap=>br.forEach(bp=>{
      let ao=ap.owner||a.owner,bo=bp.owner||b.owner;
      if(ao&&bo&&ao===bo){let os=ap.start>bp.start?ap.start:bp.start,oe=ap.end<bp.end?ap.end:bp.end;if(os<=oe)c.push({owner:ao,proj1:a.name,proj2:b.name,from:os,to:oe});}
    }));
  }
  return c;
}

function computeBack(phases,dl){
  let rev=[...phases].reverse(),cur=dl;
  rev=rev.map(ph=>{let d=ph.defaultDays||DEF_DUR[ph.name]||5;let e=cur,s=subD(e,d-1);cur=subD(s,1);return{...ph,start:s,end:e};});
  return rev.reverse();
}

function getWindow(){
  let now=new Date(),r=state.range;
  if(r==='weekly'){let s=new Date(now);s.setDate(now.getDate()-now.getDay());let e=new Date(s);e.setDate(s.getDate()+27);return{s:s.toISOString().split('T')[0],e:e.toISOString().split('T')[0]};}
  if(r==='monthly'){let s=new Date(now.getFullYear(),now.getMonth()-1,1);let e=new Date(now.getFullYear(),now.getMonth()+5,0);return{s:s.toISOString().split('T')[0],e:e.toISOString().split('T')[0]};}
  let fq=fiscalQ(now.toISOString().split('T')[0]),qs,qe;
  if(fq.q===1){qs=new Date(fq.fy-1,8,1);qe=new Date(fq.fy,5,30);}
  else if(fq.q===2){qs=new Date(fq.fy-1,11,1);qe=new Date(fq.fy,8,30);}
  else if(fq.q===3){qs=new Date(fq.fy,2,1);qe=new Date(fq.fy,11,31);}
  else{qs=new Date(fq.fy,5,1);qe=new Date(fq.fy+1,5,30);}
  return{s:qs.toISOString().split('T')[0],e:qe.toISOString().split('T')[0]};
}

function expandWin(){
  let tw=getWindow(),dates=[];
  state.projects.forEach(p=>p.phases.forEach(ph=>{if(ph.start)dates.push(ph.start);if(ph.end)dates.push(ph.end);}));
  if(!dates.length)return tw;dates.sort();
  return{s:tw.s<dates[0]?tw.s:dates[0],e:tw.e>dates[dates.length-1]?tw.e:dates[dates.length-1]};
}

function renderGantt(){
  let win=expandWin(),sD=new Date(win.s),eD=new Date(win.e),rng=Math.max(1,eD-sD);
  let isW=state.range==='weekly';
  function pct(d){if(!d)return 0;return Math.max(0,Math.min(100,(new Date(d)-sD)/rng*100));}
  let tp=pct(today()),conflicts=getConflicts(),months=mthBetween(win.s,win.e);
  let MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let mRow=months.map(m=>{let ms=new Date(m.y,m.m,1),me=new Date(m.y,m.m+1,0);if(me>eD)me=eD;if(ms<sD)ms=sD;let w=Math.max(0,(me-ms)/rng*100);return`<div class="gmc" style="width:${w}%;min-width:${w}%">${MN[m.m]}${isW?'':' '+m.y}</div>`;}).join('');
  let dRow='';
  if(isW){
    let days=[],c=new Date(sD);while(c<=eD){days.push(new Date(c));c.setDate(c.getDate()+1);}
    let dw=100/Math.max(1,days.length);
    dRow=`<div class="gdr">${days.map(d=>`<div class="gdc" style="width:${dw}%;min-width:${dw}%">${['Su','Mo','Tu','We','Th','Fr','Sa'][d.getDay()]}<br>${d.getDate()}</div>`).join('')}</div>`;
  } else {
    let marks=[];months.forEach(m=>{let last=new Date(m.y,m.m+1,0).getDate();[1,15,last].forEach(day=>{let ds=`${m.y}-${String(m.m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;if(ds>=win.s&&ds<=win.e)marks.push(ds);});});
    marks=[...new Set(marks)].sort();
    dRow=`<div class="gdr" style="position:relative;height:16px">${marks.map(ds=>`<div style="position:absolute;left:${pct(ds)}%;font-size:10px;color:var(--color-text-tertiary);transform:translateX(-50%)">${new Date(ds).getDate()}</div>`).join('')}</div>`;
  }
  let rows=state.projects.filter(p=>p.reqStatus!=='Rejected').map(p=>{
    let mc=conflicts.filter(c=>c.proj1===p.name||c.proj2===p.name);
    let bars=p.phases.map((ph,i)=>{if(!ph.start||!ph.end)return'';let l=pct(ph.start),r=pct(ph.end),w=Math.max(0.3,r-l);let c=phCol(ph.name,i);return`<div class="gbar" style="left:${l}%;width:${w}%;background:${c.bg};color:${c.t}${ph.done?';opacity:.45':''}" title="${ph.name}${ph.owner?' ('+ph.owner+')':''}: ${fmtD(ph.start)}–${fmtD(ph.end)}">${ph.name}</div>`;}).join('');
    let cBars=mc.map(c=>{let l=pct(c.from),r=pct(c.to),w=Math.max(0.5,r-l);return`<div class="gconflict" style="left:${l}%;width:${w}%;background:#E24B4A"></div>`;}).join('');
    let grid=months.map(m=>{let lp=(new Date(m.y,m.m,1)-sD)/rng*100;return lp>0&&lp<100?`<div class="ggrid" style="left:${lp}%"></div>`:''}).join('');
    let holdBadge=p.reqStatus==='On Hold'?` <span style="font-size:10px;background:#F1EFE8;color:#444441;border-radius:3px;padding:1px 4px">On Hold</span>`:'';
    return`<div class="grow" onclick="selProj(${p.id})">
      <div class="glbl"><div class="pdot" style="background:${p.color}"></div><div class="glblt"><div class="glbln">${esc(p.name)}${holdBadge}</div><div class="glbls">${esc(p.owner||'No owner')}</div></div></div>
      <div class="gbars" style="position:relative;min-height:46px">${grid}${cBars}${bars}<div class="gtoday" style="left:${tp}%"></div>${mc.length?`<div class="gcbadge"><i class="ti ti-alert-triangle" aria-hidden="true" style="font-size:10px"></i> Research conflict: ${esc(mc[0].owner)}</div>`:''}</div>
    </div>`;
  }).join('');
  let pu=[...new Set(state.projects.flatMap(p=>p.phases.map(ph=>ph.name)))];
  let alertsHTML=conflicts.length?`<div class="alerts">${conflicts.map(c=>`<div class="alert-row"><i class="ti ti-alert-triangle" aria-hidden="true"></i> <strong style="font-weight:500">${esc(c.owner)}</strong> has overlapping Research on <em>${esc(c.proj1)}</em> and <em>${esc(c.proj2)}</em> (${fmtD(c.from)}–${fmtD(c.to)})</div>`).join('')}</div>`:'';
  return`<div class="gantt-wrap"><div class="gantt">
    <div class="gh"><div class="glc">Project / owner</div><div class="gtlh"><div class="gmr">${mRow}</div>${dRow}</div></div>
    ${rows||'<div style="padding:32px;text-align:center;color:var(--color-text-secondary)">No projects yet.</div>'}
  </div></div>
  ${alertsHTML}
  <div class="legend">
    <span style="font-size:11px;color:var(--color-text-secondary);margin-right:3px">Projects:</span>
    ${state.projects.filter(p=>p.reqStatus!=='Rejected').map(p=>`<span class="li"><span class="lsw" style="border-radius:50%;background:${p.color}"></span>${esc(p.name)}</span>`).join('')}
    <span style="width:.5px;height:12px;background:var(--color-border-tertiary);margin:0 4px"></span>
    ${pu.map((n,i)=>{let c=phCol(n,i);return`<span class="li"><span class="lsw" style="background:${c.bg};border:1px solid ${c.t}40"></span>${n}</span>`;}).join('')}
    <span style="margin-left:auto;display:flex;align-items:center;gap:3px;font-size:11px;color:#E24B4A"><span style="display:inline-block;width:2px;height:11px;background:#E24B4A;border-radius:1px"></span>Today</span>
  </div>`;
}

function renderCapacity(){
  let win=getWindow(),months=mthBetween(win.s,win.e),MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return`<div class="cap-view">${months.map(m=>{
    let ms=new Date(m.y,m.m,1),me=new Date(m.y,m.m+1,0),total=me.getDate(),busy=new Set();
    state.projects.filter(p=>p.reqStatus==='Approved'||p.reqStatus==='Upcoming').forEach(p=>p.phases.forEach(ph=>{if(!ph.start||!ph.end)return;let ps=new Date(ph.start),pe=new Date(ph.end);for(let d=new Date(ms);d<=me;d.setDate(d.getDate()+1)){if(d>=ps&&d<=pe)busy.add(d.toISOString().split('T')[0]);}}));
    let p=Math.min(100,Math.round(busy.size/total*100)),cls=p>85?'over':p>60?'warn':'ok';
    let fq=fiscalQ(ms.toISOString().split('T')[0]);
    return`<div class="cap-card"><div style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:12px;font-weight:500">${MN[m.m]} ${m.y}</span><span style="font-size:10px;color:var(--color-text-secondary);background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:10px;padding:1px 7px">FY${fq.fy} Q${fq.q}</span></div><div class="cap-track"><div class="cap-fill ${cls}" style="width:${p}%"></div></div><div style="display:flex;justify-content:space-between"><span style="font-size:11px;color:var(--color-text-secondary)">${p}% used</span><span style="font-size:11px;color:${cls==='over'?'#791F1F':cls==='warn'?'#854F0B':'#085041'}">${total-busy.size} days free</span></div></div>`;
  }).join('')}</div>`;
}

function renderFit(){
  let dn=parseInt(state.fitDays)||35,sa=state.fitAfter||today();
  let h=new Date(sa);h.setMonth(h.getMonth()+12);
  let busy=new Set();
  state.projects.filter(p=>p.reqStatus==='Approved'||p.reqStatus==='Upcoming').forEach(p=>p.phases.forEach(ph=>{if(!ph.start||!ph.end)return;let ps=new Date(ph.start),pe=new Date(ph.end),sd=new Date(sa);for(let d=new Date(ps>sd?ps:sd);d<=pe&&d<=h;d.setDate(d.getDate()+1))busy.add(d.toISOString().split('T')[0]);}));
  let wins=[],cur=new Date(sa),ws=null,wd=0;
  for(let i=0;i<365;i++){let ds=cur.toISOString().split('T')[0];if(!busy.has(ds)){if(!ws)ws=ds;wd++;}else{if(ws&&wd>0){let e2=new Date(cur);e2.setDate(e2.getDate()-1);wins.push({s:ws,e:e2.toISOString().split('T')[0],d:wd});}ws=null;wd=0;}cur.setDate(cur.getDate()+1);}
  if(ws&&wd>0){let e2=new Date(cur);e2.setDate(e2.getDate()-1);wins.push({s:ws,e:e2.toISOString().split('T')[0],d:wd});}
  let slots=wins.filter(w=>w.d>=Math.max(1,dn*0.5)).slice(0,8);
  let sh=slots.length?slots.map(w=>{let fits=w.d>=dn,tight=!fits&&w.d>=dn*0.7,cls=fits?'good':tight?'tight':'none2',lbl=fits?'Fits comfortably':tight?'Tight fit':'Too short';return`<div class="fit-slot ${cls}"><div class="fit-slot-t">${fmtFull(w.s)} – ${fmtFull(w.e)}</div><div class="fit-slot-s">${w.d} free days &middot; ${lbl}</div></div>`;}).join(''):`<div class="fit-slot none2"><div class="fit-slot-t">No windows found</div><div class="fit-slot-s">No open slots of ${Math.round(dn*0.5)}+ days in the next 12 months.</div></div>`;
  return`<div class="fit-view"><div style="border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:13px"><div class="sec-lbl" style="margin-bottom:9px">Fit calculator</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px"><div class="fg"><label class="fl">Duration needed (days)</label><input class="fi" type="number" min="1" max="365" value="${dn}" oninput="state.fitDays=this.value;render()"/></div><div class="fg"><label class="fl">Start no earlier than</label><input class="fi" type="date" value="${sa}" onchange="state.fitAfter=this.value;render()"/></div></div></div><div><div class="sec-lbl" style="margin-bottom:7px">Available windows</div><div style="display:flex;flex-direction:column;gap:7px">${sh}</div></div></div>`;
}

function renderPlanner(){
  if(!state.plannerNew)state.plannerNew={dl:'',name:'New Project',color:PCOLS[state.projects.length%PCOLS.length],phases:DEF_PHASES.map(n=>({name:n,defaultDays:DEF_DUR[n]||5}))};
  let np=state.plannerNew,dl=np.dl,comp=dl?computeBack(np.phases,dl):[],total=np.phases.reduce((s,ph)=>s+(parseInt(ph.defaultDays)||5),0),startD=comp[0]?.start||'',past=startD&&startD<today();
  let cOpts=PCOLS.map(c=>`<div class="copt${np.color===c?' sel':''}" style="background:${c}" onclick="state.plannerNew.color='${c}';render()"></div>`).join('');
  let rows=np.phases.map((ph,i)=>{let c=phCol(ph.name,i),cm=comp[i];return`<div class="pl-row"><span class="pl-sw" style="background:${c.bg};border:1px solid ${c.t}40"></span><span style="flex:1;min-width:70px"><input value="${esc(ph.name)}" oninput="state.plannerNew.phases[${i}].name=this.value;render()" style="border:none;background:transparent;font-size:12px;color:var(--color-text-primary);font-family:var(--font-sans);width:100%;outline:none"/></span><div style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--color-text-secondary)"><input class="dur-in" type="number" min="1" max="90" value="${ph.defaultDays||5}" oninput="state.plannerNew.phases[${i}].defaultDays=parseInt(this.value)||1;render()"/><span>d</span></div><span class="pl-dates${cm?' set':''}">${cm?`${fmtD(cm.start)} &rarr; ${fmtD(cm.end)}`:'&mdash;'}</span><button class="del-btn row-del" onclick="state.plannerNew.phases.splice(${i},1);render()">&#215;</button></div>`;}).join('');
  let action=dl?`<div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap">${past?`<span class="wrn-badge"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Starts in the past (${fmtD(startD)})</span>`:`<span class="suc-badge"><i class="ti ti-check" aria-hidden="true"></i> Starts ${fmtD(startD)} &mdash; ${total} days</span>`}<button class="btn btn-primary btn-sm" onclick="applyPlanner()">Add to dashboard &rarr;</button></div>`:'';
  return`<div class="pl-view"><div class="pl-card"><div class="sec-lbl">Deadline planner</div><div style="display:flex;align-items:flex-end;gap:9px;flex-wrap:wrap"><div class="fg" style="flex:2;min-width:140px"><label class="fl">Project name</label><input class="fi" value="${esc(np.name)}" oninput="state.plannerNew.name=this.value"/></div><div class="fg"><label class="fl">Final deadline</label><input class="fi" type="date" value="${dl}" onchange="state.plannerNew.dl=this.value;render()"/></div><div class="fg"><label class="fl">Color</label><div class="cpr">${cOpts}</div></div></div><div style="border-top:.5px solid var(--color-border-tertiary);padding-top:9px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px"><span style="font-size:11px;color:var(--color-text-secondary)">Phase &middot; Duration &middot; Dates (backwards from deadline)</span><button class="add-phase-btn" onclick="state.plannerNew.phases.push({name:'New phase',defaultDays:5});render()"><i class="ti ti-plus" aria-hidden="true"></i> Phase</button></div>${rows}</div>${action?`<div class="divider"></div>${action}`:''}</div><p style="font-size:12px;color:var(--color-text-secondary);line-height:1.6">Set a deadline and phases fill backwards. Adjust durations and dates recalculate live.</p></div>`;
}

function renderOwners(){
  let win=expandWin(),sD=new Date(win.s),eD=new Date(win.e),rng=Math.max(1,eD-sD);
  function pct(d){if(!d)return 0;return Math.max(0,Math.min(100,(new Date(d)-sD)/rng*100));}
  let owners=[...new Set(state.projects.map(p=>p.owner).filter(Boolean))].sort();
  if(!owners.length)return`<div class="ov"><div style="padding:40px;text-align:center;color:var(--color-text-secondary)">No owners set yet.</div></div>`;
  let groups=owners.map((owner,oi)=>{
    let bg=OWNER_BG[oi%OWNER_BG.length],tx=OWNER_TX[oi%OWNER_TX.length];
    let projs=state.projects.filter(p=>p.owner===owner||p.phases.some(ph=>ph.owner===owner));
    let prows=projs.map(p=>{
      let segs=p.phases.filter(ph=>ph.start&&ph.end).map((ph,i)=>{let l=pct(ph.start),r=pct(ph.end),w=Math.max(0.3,r-l);let c=phCol(ph.name,i);return`<div class="ov-bs" style="left:${l}%;width:${w}%;background:${c.bg}"></div>`;}).join('');
      return`<div class="ov-pr" onclick="selProj(${p.id})"><div style="width:140px;min-width:140px;font-size:12px;display:flex;align-items:center;gap:6px"><span class="pdot" style="background:${p.color}"></span>${esc(p.name)}</div><div class="ov-bw">${segs}<div style="position:absolute;top:0;bottom:0;left:${pct(today())}%;width:1.5px;background:#E24B4A;z-index:2"></div></div><div style="width:90px;text-align:right;font-size:11px;color:var(--color-text-secondary)">${esc(p.reqStatus)}</div></div>`;
    }).join('');
    return`<div class="ov-group"><div class="ov-gh"><div class="av" style="background:${bg};color:${tx}">${initials(owner)}</div><div style="font-size:13px;font-weight:500">${esc(owner)}</div><div style="font-size:11px;color:var(--color-text-secondary);margin-left:auto">${projs.length} project${projs.length!==1?'s':''}</div></div>${prows||'<div style="padding:10px 12px;font-size:12px;color:var(--color-text-secondary)">No projects.</div>'}</div>`;
  }).join('');
  return`<div class="ov">${groups}</div>`;
}

function renderTable(){
  let ps=state.projects;
  let f=state.tblFilter;
  if(f==='Active')ps=ps.filter(p=>p.progStatus==='Active');
  else if(f==='Requests')ps=ps.filter(p=>p.reqStatus==='Request'||p.reqStatus==='Upcoming');
  else if(f==='On Hold')ps=ps.filter(p=>p.reqStatus==='On Hold');
  else if(f==='Approved')ps=ps.filter(p=>p.reqStatus==='Approved');
  else if(f==='Complete')ps=ps.filter(p=>p.progStatus==='Complete');
  if(state.tblSort){ps=[...ps].sort((a,b)=>{let av=a[state.tblSort]||'',bv=b[state.tblSort]||'';return av.localeCompare(bv)*state.tblDir;});}
  let filters=['All','Active','Approved','Requests','On Hold','Complete'];
  function arrow(col){return`<span style="margin-left:4px;opacity:${state.tblSort===col?1:.35};font-size:10px">${state.tblSort===col?(state.tblDir===1?'▲':'▼'):'▲'}</span>`;}
  function thS(col){return state.tblSort===col?';color:var(--color-text-primary)':'';}
  function phBadge(ph){if(!ph)return'';let c=phCol(ph,0);return`<span class="badge" style="background:${c.bg};color:${c.t}">${esc(ph)}</span>`;}
  function rqBadge(s){let m={Request:'b-req',Approved:'b-app',Rejected:'b-rej','On Hold':'b-hold',Upcoming:'b-upc'};return`<span class="badge ${m[s]||'b-req'}" style="cursor:pointer" onclick="cycleReq(${0},event)" title="Click to cycle">${esc(s)}</span>`;}

  let rows=ps.map(p=>{
    let rc=p.reqStatus==='On Hold'?'hold-row':p.reqStatus==='Rejected'?'rej-row':(p.reqStatus==='Request'||p.reqStatus==='Upcoming')?'req-row':'';
    let se=projStartEnd(p);
    return`<tr class="${rc}">
      <td style="width:22%"><div style="display:flex;align-items:center;gap:6px"><span class="pdot" style="background:${p.color};cursor:pointer" onclick="selProj(${p.id})" title="Open project"></span><input class="cel" value="${esc(p.name)}" oninput="updF(${p.id},'name',this.value)" style="font-weight:500"/></div></td>
      <td style="width:15%"><input class="cel" value="${esc(p.notes)}" oninput="updF(${p.id},'notes',this.value)" placeholder="Notes…"/>${p.holdNote&&p.reqStatus==='On Hold'?`<div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px">${esc(p.holdNote)}</div>`:''}</td>
      <td style="width:12%"><div class="badges-cell"><span class="badge ${{Request:'b-req',Approved:'b-app',Rejected:'b-rej','On Hold':'b-hold',Upcoming:'b-upc'}[p.reqStatus]||'b-req'}" style="cursor:pointer" onclick="cycleReq(${p.id})" title="Click to cycle">${esc(p.reqStatus)}</span>${p.currentPhase?phBadge(p.currentPhase):''}</div></td>
      <td style="width:8%"><select class="cel-sel" onchange="updF(${p.id},'progStatus',this.value)">${PROG_ST.map(s=>`<option${p.progStatus===s?' selected':''}>${s}</option>`).join('')}</select></td>
      <td style="width:9%"><input class="cel cel-date" value="${esc(se.start||p.startDate||'')}" oninput="updF(${p.id},'startDate',this.value)" placeholder="TBD"/></td>
      <td style="width:9%"><input class="cel cel-date" value="${esc(se.end||p.endDate||'')}" oninput="updF(${p.id},'endDate',this.value)" placeholder="TBD"/></td>
      <td style="width:10%"><input class="cel" value="${esc(p.owner)}" oninput="updF(${p.id},'owner',this.value)" placeholder="Lead…"/></td>
      <td style="width:13%;font-size:11px"><input class="cel" value="${esc(p.stakeholders||'')}" oninput="updF(${p.id},'stakeholders',this.value)" placeholder="Stakeholders…" style="font-size:11px"/></td>
      <td style="width:2%;text-align:center"><button class="row-del2" onclick="delProj(${p.id})" title="Remove">&#215;</button></td>
    </tr>`;
  }).join('');

  return`<div class="tv">
    <div class="tv-hdr"><h2>Project projections</h2><p>Last updated: ${esc(state.lastUpdated)}</p></div>
    <div class="tv-filters">
      <span style="font-size:11px;color:var(--color-text-secondary)">Filter:</span>
      ${filters.map(f2=>`<button class="flt-btn${state.tblFilter===f2?' on':''}" onclick="state.tblFilter='${f2}';render()">${f2}</button>`).join('')}
      <span style="margin-left:auto;font-size:11px;color:var(--color-text-secondary);cursor:pointer" onclick="stampDate()" title="Stamp today"><i class="ti ti-refresh" aria-hidden="true" style="font-size:12px"></i> Update date</span>
    </div>
    <div class="tv-scroll">
      <table class="tv-tbl">
        <thead><tr>
          <th onclick="tblSort('name')" style="${thS('name')}">Project ${arrow('name')}</th>
          <th>Notes</th>
          <th onclick="tblSort('reqStatus')" style="${thS('reqStatus')}">Status ${arrow('reqStatus')}</th>
          <th onclick="tblSort('progStatus')" style="${thS('progStatus')}">Progress ${arrow('progStatus')}</th>
          <th onclick="tblSort('startDate')" style="${thS('startDate')}">Start ${arrow('startDate')}</th>
          <th onclick="tblSort('endDate')" style="${thS('endDate')}">End ${arrow('endDate')}</th>
          <th onclick="tblSort('owner')" style="${thS('owner')}">Project lead ${arrow('owner')}</th>
          <th>Stakeholder(s)</th>
          <th></th>
        </tr></thead>
        <tbody>${rows||`<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--color-text-secondary)">No projects match this filter.</td></tr>`}</tbody>
      </table>
    </div>
    <div class="tv-add" onclick="addProj()"><i class="ti ti-plus" aria-hidden="true" style="font-size:14px"></i> Add project</div>
    <div class="tv-footer"><span>${ps.length} project${ps.length!==1?'s':''} shown</span><button class="btn btn-sm" onclick="exportAll()"><i class="ti ti-download" aria-hidden="true"></i> Export CSV</button></div>
  </div>`;
}

function renderProject(pid){
  let p=state.projects.find(x=>x.id===pid);
  if(!p)return'<div style="padding:32px;text-align:center;color:var(--color-text-secondary)">Not found.</div>';
  let cOpts=PCOLS.map(c=>`<div class="copt${p.color===c?' sel':''}" style="background:${c}" onclick="setProjColor(${p.id},'${c}')"></div>`).join('');
  let cpk=state.cpicker===p.id?`<div class="cpicker">${cOpts}</div>`:'';
  let actPh=p.phases.findIndex(ph=>!ph.done&&ph.start&&ph.end);
  let se=projStartEnd(p),totalD=p.phases.reduce((s,ph)=>s+(ph.start&&ph.end?dur(ph.start,ph.end):0),0),doneC=p.phases.filter(ph=>ph.done).length;
  let phRows=p.phases.map((ph,i)=>{
    let c=phCol(ph.name,i),d=ph.start&&ph.end?dur(ph.start,ph.end)+'d':'',rc=ph.done?'ph-done':i===actPh?'ph-active':'';
    return`<tr class="${rc}"><td style="width:4%"><input type="checkbox" ${ph.done?'checked':''} onchange="toggleDone(${p.id},${i},this.checked)" style="cursor:pointer;accent-color:#1D9E75"/></td><td style="width:25%"><div style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:2px;background:${c.bg};border:1px solid ${c.t}40;flex-shrink:0;display:inline-block"></span><input value="${esc(ph.name)}" oninput="updPhaseName(${p.id},${i},this.value)" style="border:none;background:transparent;font-size:12px;color:var(--color-text-primary);font-family:var(--font-sans);width:100%;outline:none${ph.done?';text-decoration:line-through':''}"/></div></td><td style="width:18%"><input class="date-in" type="date" value="${ph.start||''}" onchange="updPhaseDate(${p.id},${i},'start',this.value)"/></td><td style="width:18%"><input class="date-in" type="date" value="${ph.end||''}" onchange="updPhaseDate(${p.id},${i},'end',this.value)"/></td><td style="width:18%"><input class="txt-in" value="${esc(ph.owner||'')}" oninput="updPhaseOwner(${p.id},${i},this.value)" placeholder="Owner"/></td><td style="width:9%;color:var(--color-text-secondary);font-size:11px">${d}</td><td style="width:4%"><button class="del-btn row-del" onclick="delPhase(${p.id},${i})">&#215;</button></td></tr>`;
  }).join('');
  let holdBlock=(p.reqStatus==='On Hold'||p.reqStatus==='Rejected')?`<div class="hold-card${p.reqStatus==='Rejected'?' rej':''}"><div style="font-size:12px;font-weight:500;color:${p.reqStatus==='Rejected'?'#791F1F':'#444441'}">${p.reqStatus==='On Hold'?'On hold':'Rejected'}</div><textarea class="notes-ta" oninput="updF(${p.id},'holdNote',this.value)" placeholder="${p.reqStatus==='On Hold'?'Why on hold? When might it begin?':'Reason for rejection…'}" style="min-height:44px">${esc(p.holdNote||'')}</textarea></div>`:'';
  let rqMap={Request:'b-req',Approved:'b-app',Rejected:'b-rej','On Hold':'b-hold',Upcoming:'b-upc'};
  let pgMap={Planned:'b-pln',Active:'b-act',Complete:'b-cmp'};
  return`<div class="pv">
    <div style="display:flex;align-items:flex-start;gap:9px">
      <div style="display:flex;flex-direction:column;gap:4px;padding-top:5px"><div class="color-btn" style="background:${p.color}" onclick="toggleCpicker(${p.id})"></div>${cpk}</div>
      <div style="flex:1;display:flex;flex-direction:column;gap:7px">
        <input class="pv-title" value="${esc(p.name)}" oninput="updF(${p.id},'name',this.value)" placeholder="Project name"/>
        <div style="display:flex;gap:7px;align-items:flex-end;flex-wrap:wrap">
          <div class="fg"><label class="fl">Project owner</label><input class="fi" style="width:140px" value="${esc(p.owner||'')}" oninput="updF(${p.id},'owner',this.value)" placeholder="Owner"/></div>
          <div class="fg"><label class="fl">Stakeholders</label><input class="fi" style="width:200px" value="${esc(p.stakeholders||'')}" oninput="updF(${p.id},'stakeholders',this.value)" placeholder="Stakeholders…"/></div>
          <div class="fg"><label class="fl">Request status</label><select class="sel-in" onchange="updF(${p.id},'reqStatus',this.value);render()">${REQ_ST.map(s=>`<option${p.reqStatus===s?' selected':''}>${s}</option>`).join('')}</select></div>
          <div class="fg"><label class="fl">Progress</label><select class="sel-in" onchange="updF(${p.id},'progStatus',this.value);render()">${PROG_ST.map(s=>`<option${p.progStatus===s?' selected':''}>${s}</option>`).join('')}</select></div>
          <div class="fg"><label class="fl">Current phase</label><select class="sel-in" onchange="updF(${p.id},'currentPhase',this.value);render()"><option value="">—</option>${[...new Set(['Request','Planning','Recruitment','Research','Analysis','Reporting',...p.phases.map(ph=>ph.name)])].map(s=>`<option${p.currentPhase===s?' selected':''}>${s}</option>`).join('')}</select></div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <span class="badge ${rqMap[p.reqStatus]||'b-req'}">${p.reqStatus}</span>
          <span class="badge ${pgMap[p.progStatus]||'b-pln'}">${p.progStatus}</span>
          ${se.start?`<span style="font-size:11px;color:var(--color-text-secondary)">${fmtD(se.start)} &rarr; ${fmtD(se.end)} &middot; ${totalD}d &middot; ${doneC}/${p.phases.length} done</span>`:''}
        </div>
      </div>
    </div>
    ${holdBlock}
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
        <span class="sec-lbl" style="margin-bottom:0">Phases &amp; timeline</span>
        <button class="btn btn-sm" onclick="openPlannerFor(${p.id})">Re-plan from deadline</button>
      </div>
      <table class="pt"><thead><tr><th style="width:4%"></th><th>Phase</th><th>Start</th><th>End</th><th>Phase owner</th><th>Dur.</th><th></th></tr></thead><tbody>${phRows}</tbody></table>
      <div style="padding:4px 7px"><button class="add-phase-btn" onclick="addPhase(${p.id})"><i class="ti ti-plus" aria-hidden="true"></i> Add phase</button></div>
    </div>
    <div><div class="sec-lbl">Notes</div><textarea class="notes-ta" oninput="updF(${p.id},'notes',this.value)" placeholder="Notes, links, context&hellip;">${esc(p.notes||'')}</textarea></div>
    <div class="divider"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:7px;flex-wrap:wrap"><a href="${GS}" class="gs-link" target="_blank" rel="noopener">Google Sheet &#8599;</a><button class="btn btn-sm" onclick="exportOne(${p.id})">Export CSV</button></div>
      <button class="btn btn-sm btn-danger" onclick="delProj(${p.id})">Delete project</button>
    </div>
  </div>`;
}

function render(){
  let v=state.view;
  let main='';
  if(v==='gantt')main=renderGantt();
  else if(v==='capacity')main=renderCapacity();
  else if(v==='fit')main=renderFit();
  else if(v==='planner')main=renderPlanner();
  else if(v==='owners')main=renderOwners();
  else if(v==='table')main=renderTable();
  else if(v==='project')main=renderProject(state.activeProject);

  let ptabs=state.projects.map(p=>`<div class="tab${v==='project'&&state.activeProject===p.id?' active':''}" onclick="selProj(${p.id})"><span class="tab-dot" style="background:${p.color}"></span>${esc(p.name)||'Unnamed'}</div>`).join('');

  let modal='';
  if(state.showNew){
    let np=state.newProj||{};
    let cO=PCOLS.map(c=>`<div class="copt${(np.color||PCOLS[0])===c?' sel':''}" style="background:${c}" onclick="state.newProj.color='${c}';render()"></div>`).join('');
    modal=`<div style="display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.42);min-height:500px;border-radius:var(--border-radius-lg)"><div class="modal"><h3>New project</h3><div class="fg"><label class="fl">Project name</label><input class="fi" placeholder="Project name" value="${esc(np.name||'')}" oninput="state.newProj.name=this.value"/></div><div class="fg"><label class="fl">Project owner</label><input class="fi" placeholder="Owner" value="${esc(np.owner||'')}" oninput="state.newProj.owner=this.value"/></div><div class="fg"><label class="fl">Stakeholders</label><input class="fi" placeholder="Stakeholders…" value="${esc(np.stakeholders||'')}" oninput="state.newProj.stakeholders=this.value"/></div><div class="fg"><label class="fl">Request status</label><select class="fi" onchange="state.newProj.reqStatus=this.value">${REQ_ST.map(s=>`<option${(np.reqStatus||'Request')===s?' selected':''}>${s}</option>`).join('')}</select></div><div class="fg"><label class="fl">Color</label><div class="cpr">${cO}</div></div><div class="modal-actions"><button class="btn" onclick="state.showNew=false;render()">Cancel</button><button class="btn btn-primary" onclick="createProj()">Create</button></div></div></div>`;
  }

  document.getElementById('app').innerHTML=`
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:8px"><span class="app-title">Project Dashboard</span></div>
      <div class="topbar-right">
        <div style="display:flex;gap:2px">
          <button class="btn${v==='gantt'?' active':''}" onclick="setV('gantt')">Gantt</button>
          <button class="btn${v==='table'?' active':''}" onclick="setV('table')">Table</button>
          <button class="btn${v==='capacity'?' active':''}" onclick="setV('capacity')">Capacity</button>
          <button class="btn${v==='fit'?' active':''}" onclick="setV('fit')">Fit finder</button>
          <button class="btn${v==='planner'?' active':''}" onclick="setV('planner')">Planner</button>
          <button class="btn${v==='owners'?' active':''}" onclick="setV('owners')">By owner</button>
        </div>
        <div style="display:flex;gap:2px">
          <button class="btn${state.range==='weekly'?' active':''}" onclick="setR('weekly')">Week</button>
          <button class="btn${state.range==='monthly'?' active':''}" onclick="setR('monthly')">Month</button>
          <button class="btn${state.range==='quarterly'?' active':''}" onclick="setR('quarterly')">Quarter</button>
        </div>
        <button class="btn" onclick="exportAll()"><i class="ti ti-download" aria-hidden="true"></i> Export</button>
        <button class="btn btn-primary" onclick="showNew()"><i class="ti ti-plus" aria-hidden="true"></i> New</button>
        <a href="${GS}" class="gs-link" target="_blank" rel="noopener">Sheet &#8599;</a>
      </div>
    </div>
    <div class="tab-bar">
      <div class="tab${v==='gantt'?' active':''}" onclick="setV('gantt')">Gantt</div>
      <div class="tab${v==='table'?' active':''}" onclick="setV('table')">Table</div>
      <div class="tab${v==='capacity'?' active':''}" onclick="setV('capacity')">Capacity</div>
      <div class="tab${v==='fit'?' active':''}" onclick="setV('fit')">Fit finder</div>
      <div class="tab${v==='planner'?' active':''}" onclick="setV('planner')">Planner</div>
      <div class="tab${v==='owners'?' active':''}" onclick="setV('owners')">By owner</div>
      <div class="tab-sep"></div>
      ${ptabs}
      <div class="tab-add" onclick="showNew()" title="New project"><i class="ti ti-plus" aria-hidden="true"></i></div>
    </div>
    <div class="content">${modal||main}</div>
  `;
}

function setV(v){state.view=v;render();}
function setR(r){state.range=r;render();}
function selProj(id){state.activeProject=id;state.view='project';state.cpicker=null;render();}
function showNew(){state.showNew=true;state.newProj={name:'',owner:'',stakeholders:'',reqStatus:'Request',color:PCOLS[state.projects.length%PCOLS.length]};render();}
function toggleCpicker(id){state.cpicker=state.cpicker===id?null:id;render();}
function setProjColor(id,c){let p=state.projects.find(x=>x.id===id);if(p){p.color=c;state.cpicker=null;render();save();}}
function updF(id,f,v){let p=state.projects.find(x=>x.id===id);if(p){p[f]=v;if(f==='reqStatus'||f==='progStatus')render();save();}}
function cycleReq(id){let p=state.projects.find(x=>x.id===id);if(!p)return;let i=REQ_ST.indexOf(p.reqStatus);p.reqStatus=REQ_ST[(i+1)%REQ_ST.length];render();save();}
function toggleDone(pid,idx,v){let p=state.projects.find(x=>x.id===pid);if(p&&p.phases[idx]){p.phases[idx].done=v;render();save();}}
function updPhaseName(pid,idx,v){let p=state.projects.find(x=>x.id===pid);if(p&&p.phases[idx]){p.phases[idx].name=v;save();}}
function updPhaseDate(pid,idx,f,v){let p=state.projects.find(x=>x.id===pid);if(p&&p.phases[idx]){p.phases[idx][f]=v;render();save();}}
function updPhaseOwner(pid,idx,v){let p=state.projects.find(x=>x.id===pid);if(p&&p.phases[idx]){p.phases[idx].owner=v;save();}}
function addPhase(pid){let p=state.projects.find(x=>x.id===pid);if(p){p.phases.push({name:'New phase',start:'',end:'',done:false,owner:''});render();save();}}
function delPhase(pid,idx){let p=state.projects.find(x=>x.id===pid);if(p){p.phases.splice(idx,1);render();save();}}
function delProj(id){if(!confirm('Delete this project?'))return;state.projects=state.projects.filter(p=>p.id!==id);state.activeProject=null;state.view='gantt';render();save();}
function addProj(){showNew();}
function createProj(){
  let np=state.newProj,name=(np.name||'').trim()||'New Project',id=Date.now();
  state.projects.push({id,name,reqStatus:np.reqStatus||'Request',progStatus:'Planned',color:np.color||PCOLS[0],owner:np.owner||'',stakeholders:np.stakeholders||'',notes:'',holdNote:'',currentPhase:'',phases:DEF_PHASES.map(n=>({name:n,start:'',end:'',done:false,owner:np.owner||''}))});
  state.showNew=false;state.activeProject=id;state.view='project';render();save();
}
function applyPlanner(){
  let np=state.plannerNew;if(!np||!np.dl)return;
  let comp=computeBack(np.phases,np.dl),id=Date.now();
  state.projects.push({id,name:np.name||'New Project',reqStatus:'Request',progStatus:'Planned',color:np.color||PCOLS[0],owner:'',stakeholders:'',notes:'',holdNote:'',currentPhase:'',phases:comp.map(ph=>({name:ph.name,start:ph.start,end:ph.end,done:false,owner:''}))});
  state.plannerNew=null;state.activeProject=id;state.view='project';render();save();
}
function openPlannerFor(pid){
  let p=state.projects.find(x=>x.id===pid);if(!p)return;
  state.plannerNew={dl:'',name:p.name,color:p.color,phases:p.phases.map(ph=>({name:ph.name,defaultDays:ph.start&&ph.end?dur(ph.start,ph.end):(DEF_DUR[ph.name]||5)}))};
  state.view='planner';render();
}
function tblSort(col){if(state.tblSort===col)state.tblDir*=-1;else{state.tblSort=col;state.tblDir=1;}render();}
function stampDate(){state.lastUpdated=todayFull();render();save();}
function toCSV(rows){return rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');}
function dlCSV(csv,fn){let b=new Blob([csv],{type:'text/csv'});let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);}
function exportOne(pid){let p=state.projects.find(x=>x.id===pid);if(!p)return;let rows=[['Project','Owner','Stakeholders','Req Status','Progress','Current Phase','Phase','Phase Owner','Start','End','Duration (days)','Done','Notes']];p.phases.forEach(ph=>{rows.push([p.name,p.owner||'',p.stakeholders||'',p.reqStatus,p.progStatus,p.currentPhase||'',ph.name,ph.owner||'',ph.start||'',ph.end||'',ph.start&&ph.end?dur(ph.start,ph.end):'',ph.done?'Yes':'No',p.notes||'']);});dlCSV(toCSV(rows),`${p.name.replace(/[^a-z0-9]/gi,'_')}.csv`);}
function exportAll(){let rows=[['Project','Owner','Stakeholders','Req Status','Progress','Current Phase','Phase','Phase Owner','Start','End','Duration (days)','Done','Notes','Hold Note']];state.projects.forEach(p=>{p.phases.forEach(ph=>{rows.push([p.name,p.owner||'',p.stakeholders||'',p.reqStatus,p.progStatus,p.currentPhase||'',ph.name,ph.owner||'',ph.start||'',ph.end||'',ph.start&&ph.end?dur(ph.start,ph.end):'',ph.done?'Yes':'No',p.notes||'',p.holdNote||'']);});});dlCSV(toCSV(rows),'all_projects.csv');}

render();
</script>
</body>
</html>
